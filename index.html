<style>
:root{
  --bg:#FFF7F4; --surface:#ffffff; --surface2:#FFF0EB;
  --text:#3A3A38; --text2:#6B5B55; --text3:#6B5B5580;
  --muted:#5a6b5e; --border:#e2ecdf;
  --brand:#D42E3C; --brand-d:#A01E28; --brand-l:#F26430;
  --hero:linear-gradient(135deg,#A01E28,#D42E3C 55%,#F26430);
  --shadow:0 2px 12px rgba(27,94,32,.08);
  --track:#e6ede4;
}
html[data-theme="dark"]{
  --bg:#1a0a0b; --surface:#2a1215; --surface2:#200d0f;
  --text:#f5e8e8; --text2:#c9a0a5; --text3:#9e6570;
  --muted:#a9bdb0; --border:#2a3a30;
  --brand:#E85A6A; --brand-d:#F08090; --brand-l:#F5A070;
  --hero:linear-gradient(135deg,#3A0810,#5A1520);
  --shadow:0 2px 12px rgba(0,0,0,.35);
  --track:#2c3c33;
}
html[data-fs="std"]{ font-size:16px; }
html[data-fs="large"]{ font-size:18.5px; }
html[data-fs="xl"]{ font-size:21px; }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",sans-serif;
  line-height:1.55;transition:background .25s,color .25s;}
.wrap{max-width:560px;margin:0 auto;padding:12px 14px calc(140px + env(safe-area-inset-bottom));}
.appbar{background:var(--bg);
  padding:6px 2px 8px;display:flex;align-items:center;gap:8px;}
.appbar .brand{font-size:1.15rem;font-weight:800;color:var(--brand-d);}
.appbar .sec{font-size:.72rem;font-weight:800;letter-spacing:2px;color:var(--brand-l);opacity:.8;}
.card{background:var(--surface);border-radius:16px;padding:1rem;margin:.7rem 0;
  box-shadow:var(--shadow);border:1px solid var(--border);}
h2.title{font-size:1.15rem;font-weight:800;color:var(--brand-d);margin:1.1rem 2px .2rem;}
.lead{font-size:.82rem;color:var(--muted);margin:0 2px .5rem;}

/* hero ring */
.hero{text-align:center;}
.hero .date{color:var(--muted);font-size:.86rem;}
.ring-wrap{position:relative;width:148px;height:148px;margin:.4rem auto .2rem;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-wrap .mid{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.ring-wrap .pct{font-size:2rem;font-weight:800;color:var(--brand-d);line-height:1;}
.ring-wrap .pl{font-size:.78rem;color:var(--muted);margin-top:2px;}
.verse{background:var(--surface2);border-left:4px solid var(--brand-l);border-radius:12px;
  padding:.7rem .85rem;margin-top:.7rem;color:var(--brand-d);font-size:.92rem;font-style:italic;text-align:center;}

/* pillar */
.pillar{display:flex;gap:.7rem;align-items:flex-start;}
.pillar .ic{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:1.5rem;background:var(--surface2);}
.pillar .body{flex:1;min-width:0;}
.pillar .row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.pillar .nm{font-size:1.05rem;font-weight:800;}
.pillar .en{font-size:.82rem;color:var(--muted);font-weight:500;margin-left:5px;}
.pillar .goal{font-size:.92rem;color:var(--muted);font-weight:700;white-space:nowrap;}
.pillar .goal.done{color:var(--brand);}
.pillar .tip{font-size:.8rem;color:var(--muted);margin:.2rem 0 .5rem;}
.bar{height:7px;background:var(--track);border-radius:4px;overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:4px;transition:width .35s;}
.counter{display:flex;align-items:center;gap:.8rem;margin-top:.55rem;}
.counter button{width:42px;height:42px;border-radius:50%;border:none;font-size:1.4rem;
  font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.counter .v{font-size:1.3rem;font-weight:800;min-width:2.2rem;text-align:center;}
.counter .minus{background:var(--track);color:var(--text2);}
.toggle-btn{margin-top:.55rem;width:100%;padding:.6rem;border-radius:12px;border:2px solid var(--border);
  background:var(--surface2);color:var(--muted);font-size:1rem;font-weight:700;cursor:pointer;}
.toggle-btn.on{border-color:transparent;color:#fff;}

/* rainbow */
.arc{display:flex;gap:5px;justify-content:center;margin:.2rem 0 .7rem;}
.seg{flex:1;height:18px;border-radius:10px;background:var(--track);transition:.25s;}
.cnt{font-size:2rem;font-weight:800;color:var(--brand-d);}
.cnt small{font-size:1rem;font-weight:700;color:var(--muted);}
.msg{font-size:.95rem;color:var(--brand);font-weight:700;min-height:1.3rem;margin-top:.2rem;}
.sub{font-size:.8rem;color:var(--muted);}
.food{display:flex;align-items:center;gap:.7rem;background:var(--surface);border:2px solid var(--border);
  border-radius:16px;padding:.7rem .8rem;margin:.5rem 0;cursor:pointer;transition:.15s;}
.food .dot{width:28px;height:28px;border-radius:50%;flex:0 0 auto;border:2px solid rgba(0,0,0,.06);}
.food .b{flex:1;min-width:0;}
.food .nm{font-size:1.05rem;font-weight:800;}
.food .ef{font-size:.82rem;color:var(--muted);font-weight:600;}
.food .nut{font-size:.76rem;color:var(--muted);margin-top:1px;}
.food .more{font-size:.76rem;color:var(--brand-l);font-weight:700;margin-top:3px;display:inline-block;}
.food .detail{display:none;font-size:.8rem;color:var(--text2);padding-top:4px;}
.food .detail.show{display:block;}
.food .detail b{color:var(--brand-d);}
.food .detail .dgrp{margin-top:.4rem;}
.food .detail .dgrp b{display:block;font-size:.8rem;color:var(--brand-d);margin-bottom:.3rem;}
.food .detail .fd{display:flex;flex-wrap:wrap;gap:.4rem;}
.food .fchip.on{background:var(--cc);border-color:var(--cc);color:#fff;}
.food.pearl .fchip.on{background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border-color:#d2ccbd;color:#6b6452;}
.food.pearl.on .mk{background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border-color:#d2ccbd;color:#6b6452;}
@keyframes celebPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes burstRing{0%{opacity:0.9;transform:translate(-50%,-50%) scale(0.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
@keyframes confettiShoot{0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) rotate(0deg) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) translate(var(--tx),calc(var(--ty) + 120px)) rotate(720deg) scale(0.3)}}
.food .mk{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--track);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--track);font-weight:900;}
.food.on{border-color:var(--cc);background:var(--ccbg);}
.food.on .mk{border-color:var(--cc);background:var(--cc);color:#fff;}
.sf{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:.7rem .8rem;margin:.5rem 0;}
.sf .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.sf .cat{font-size:1rem;font-weight:800;color:var(--brand-d);}
.sf .fd{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.fchip{border:2px solid var(--border);background:var(--surface);color:var(--text2);border-radius:999px;padding:.34rem .72rem;font-size:.88rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s;}
.fchip.on{background:var(--brand);border-color:var(--brand);color:#fff;}
.sfreset{margin-top:.55rem;border:none;background:none;color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer;padding:2px 0;}
.sf .ef{font-size:.78rem;color:var(--muted);margin-top:2px;}
.chk{flex:0 0 auto;border:2px solid var(--border);color:var(--muted);background:var(--surface);
  border-radius:999px;padding:.35rem .7rem;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.chk.on{background:var(--brand);border-color:var(--brand);color:#fff;}

/* settings */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row .l{font-size:1rem;font-weight:700;}
.set-row .d{font-size:.78rem;color:var(--muted);margin-top:2px;}
.seg-ctrl{display:flex;background:var(--surface2);border-radius:12px;padding:3px;gap:3px;}
.seg-ctrl button{border:none;background:none;padding:.4rem .7rem;border-radius:10px;font-size:.9rem;
  font-weight:700;color:var(--muted);cursor:pointer;}
.seg-ctrl button.on{background:var(--brand);color:#fff;}
.switch{width:52px;height:30px;border-radius:16px;background:var(--track);border:none;position:relative;cursor:pointer;transition:.2s;}
.switch.on{background:var(--brand);}

/* 電量貢獻：E生愛快充每次+50%（封頂100%），其他每項完成+10% */
function _cellPct(){
 var d=today();
 var cc=Math.min(d['cc']||0,2); // 最多計2次
 var pcc=Math.min(cc*50,100);
 var others=['e','g','s','r','n','w','b'];
 var extras=0;
 others.forEach(function(k){
   var p=null; PILLARS.forEach(function(x){if(x.k===k)p=x;});
   if(!p)return;
   var v=d[k]||0;
   if(p.type==='toggle'){if(v)extras+=10;}
   else{if(v>=goalOf(p))extras+=10;}
 });
 return Math.min(100, pcc + extras);
}

/* ===================== 設定套用 ===================== */
function applySettings(){
  document.documentElement.dataset.theme = S.settings.theme;
  document.documentElement.dataset.fs = S.settings.fs;
  document.body.setAttribute('data-dark', S.settings.theme==='dark'?'1':'0');
  var m=document.querySelector('meta[name=theme-color]');
  if(m) m.setAttribute('content', S.settings.theme==='dark'?'#10301a':'#1b5e20');
}

/* ===================== 工具 ===================== */
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function cnumber(n){var z=['零','一','二','三','四','五','六','七','八','九','十'];return (n>=0&&n<=10)?z[n]:(''+n);}
function esc(s){return (''+s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function estep(n,t,x){return '<div class="step"><div class="num">'+n+'</div><div><div class="st">'+t+'</div><div class="sx">'+x+'</div></div></div>';}
var toastT;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1800);}

/* ===================== 打卡頁 ===================== */
function goalOf(p){return (S.goals&&S.goals[p.k]!=null)?S.goals[p.k]:p.goal;}
function pillarPct(p){var d=today();var v=d[p.k]||0;
  if(p.type==='charge'){return Math.min(1,v/p.goal);}
  if(p.type==='toggle') return v?1:0; return Math.min(v/goalOf(p),1);}
function overallPct(){return _cellPct();}

function celebrate(p){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;';
  var ring='<div style="position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;border:4px solid '+p.color+';animation:burstRing 0.7s ease-out forwards;opacity:0"></div>';
  var card='<div style="position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,'+p.color+','+p.color+'cc);border-radius:20px;padding:16px 24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.25),0 0 40px '+p.color+'60;animation:celebPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards">'
    +'<div style="font-size:50px;margin-bottom:4px">'+p.icon+'</div>'
    +'<div style="font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.3)">'+p.zh+' 達成！</div>'
    +'<div style="font-size:15px;color:rgba(255,255,255,0.9);margin-top:3px">目標完成 ✅ 繼續加油！</div></div>';
  var cols=['#FF6B35','#FFD54F','#4CAF50','#2196F3','#CE93D8','#EF9A9A','#80CBC4','#FFB74D'];
  var shapes=['●','■','▲','★','◆'];
  var conf='';
  for(var f=0;f<24;f++){
    var a=f/24*360, s=80+Math.random()*60;
    var tx=Math.cos(a*Math.PI/180)*s, ty=Math.sin(a*Math.PI/180)*s-40;
    conf+='<div style="position:absolute;top:38%;left:50%;font-size:'+(f%3===0?14:10)+'px;color:'+cols[f%cols.length]+';font-weight:900;animation:confettiShoot 1.4s ease-out '+(f*0.03)+'s forwards;--tx:'+tx+'px;--ty:'+ty+'px;opacity:0">'+shapes[f%shapes.length]+'</div>';
  }
  ov.innerHTML=ring+card+conf;
  document.body.appendChild(ov);
  setTimeout(function(){ov.remove();},1700);
}

  var view=document.getElementById('view'); view.innerHTML='';
  document.getElementById('secLabel').textContent='⚡ E生愛快充 CHARGE';
  var d=new Date();var wd=['日','一','二','三','四','五','六'][d.getDay()];

  var hero=el('div','card hero');

    '<div class="hero-logo"><img src="'+LOGO_FULL+'" alt="AIFYA 細胞快充"></div>'+
    '<div class="date">'+d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 ‧ 星期'+wd+'</div>'+
    '<div class="ring-wrap"><svg width="148" height="148">'+
      '<circle cx="74" cy="74" r="'+R+'" fill="none" stroke="var(--track)" stroke-width="12"/>'+
      '<circle cx="74" cy="74" r="'+R+'" fill="none" stroke="var(--brand)" stroke-width="12" stroke-linecap="round" '+
      'stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'"/></svg>'+
      '<div class="mid"><div class="pct">'+pct+'%</div>'+
      '<div class="pl">今日細胞電量</div>'+
      (pct>=100?'<div style="font-size:.82rem;color:#F26430;font-weight:800;margin-top:4px">⚡ 滿電達標！</div>':'')+
      '</div></div>';
  var vs=VERSES[(Math.floor((Date.now()/86400000)))%VERSES.length];
  hero.appendChild(el('div','verse','「'+vs[0]+'」<br>— '+vs[1]));
  view.appendChild(hero);

  view.appendChild(el('h2','title','⚡ 五個開關 — 啟動細胞滿電'));
  PILLARS.forEach(function(p){
    var d2=today();var v=d2[p.k]||0;var pc=pillarPct(p);
    var card=el('div','card');
    var done = p.type==='toggle'? !!v : v>=goalOf(p);
    var goalTxt = p.type==='toggle' ? (v?'已完成 ✓':'尚未完成') : (v+'/'+goalOf(p)+' '+p.unit);
    var inner=
      '<div class="pillar"><div class="ic" style="background:'+p.color+'22">'+p.icon+'</div>'+
      '<div class="body"><div class="row1"><div><span class="nm">'+p.zh+'</span><span class="en">'+p.en+'</span></div>'+
      '<div class="goal'+(done?' done':'')+'">'+goalTxt+'</div></div>'+
      '<div class="tip">'+p.tip+'</div>'+
      (p.type==='charge'
        ? '<div class="bar"><i style="width:'+Math.min(100,(v/2*100))+'%;background:'+p.color+'"></i></div>'+
          '<div class="counter"><button class="minus" data-act="dec" style="background:var(--track);color:var(--text2)">−</button>'+
          '<span class="v">'+v+'</span>'+
          '<button data-act="inc" style="width:auto;padding:0 16px;border-radius:22px;font-size:1rem;white-space:nowrap;background:linear-gradient(135deg,'+p.color+',#F26430)">+充電</button></div>'
        : p.type==='count'
        ? '<div class="bar"><i style="width:'+(pc*100)+'%;background:'+p.color+'"></i></div>'+
          '<div class="counter"><button class="minus" data-act="dec">−</button>'+
          '<span class="v">'+v+'</span>'+
          '<button data-act="inc" style="background:'+p.color+'">+</button></div>'
        : '<button class="toggle-btn'+(v?' on':'')+'" data-act="toggle" '+(v?'style="background:'+p.color+'"':'')+'>'+
          (v?'✓ 今日已完成':'點一下完成')+'</button>')+
      '</div></div>';
    card.innerHTML=inner;
    card.querySelectorAll('[data-act]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var dd=today();var cur=dd[p.k]||0;
        var wasDone=p.type==='toggle'?!!cur:(p.type==='charge'?cur>=p.goal:cur>=goalOf(p));
        var act=btn.dataset.act;
        var st=p.step||1;
        if(act==='inc') cur=cur+st;
        else if(act==='dec') cur=Math.max(0,cur-st);
        else if(act==='toggle') cur=cur?0:1;
        dd[p.k]=cur; save();
        var nowDone=p.type==='toggle'?!!cur:(p.type==='charge'?cur>=p.goal:cur>=goalOf(p));
        if(nowDone&&!wasDone) celebrate(p);
        renderHome();
      });

window._brClose=function(){ if(_brTimer){clearTimeout(_brTimer);_brTimer=null;} var ov=document.getElementById('breath-overlay'); if(ov)ov.remove(); };
window._brStart=function(){ var b=document.getElementById('br-start'); if(b)b.style.display='none'; _brCycle=0; _brRun('inhale'); };
function _brRun(phase){
  var circle=document.getElementById('br-circle'),ph=document.getElementById('br-phase'),cnt=document.getElementById('br-count');
  if(!circle)return;
  if(phase==='inhale'){
    _brCycle++; if(cnt)cnt.textContent='第 '+_brCycle+' / 5 次';
    circle.style.transition='transform 4s ease-in-out'; circle.style.transform='scale(1.18)';
    if(ph)ph.textContent='吸氣 4 秒';
    _brTimer=setTimeout(function(){_brRun('hold');},4000);
  } else if(phase==='hold'){
    if(ph)ph.textContent='屏息 7 秒';
    _brTimer=setTimeout(function(){_brRun('exhale');},7000);
  } else {
    circle.style.transition='transform 8s ease-in-out'; circle.style.transform='scale(0.7)';
    if(ph)ph.textContent='吐氣 8 秒';
    _brTimer=setTimeout(function(){ if(_brCycle>=5){_brFinish();} else {_brRun('inhale');} },8000);
  }
}
function _brFinish(){
  var dd=today(),p=null; PILLARS.forEach(function(x){if(x.k==='a')p=x;}); dd['a']=goalOf(p); save();
  var ph=document.getElementById('br-phase'); if(ph)ph.textContent='完成 🙏';
  var cnt=document.getElementById('br-count'); if(cnt)cnt.textContent='已完成五次深呼吸，平安臨到！';
  var b=document.getElementById('br-start'); if(b){ b.style.display=''; b.textContent='✓ 完成，返回'; b.setAttribute('onclick','window._brCloseDone()'); }
}
window._brCloseDone=function(){ window._brClose(); renderHome(); toast('🌬️ 深呼吸五次完成，身心舒暢！'); };

var INK_TYPES={food:{lbl:'食物',ic:'🍎',c:'#D42E3C'},supp:{lbl:'營養品',ic:'🌿',c:'#388E3C'},med:{lbl:'藥物',ic:'💊',c:'#c62828'}};
function _inkItems(){ if(!S.intakeItems)S.intakeItems=[]; return S.intakeItems; }
function _inkLog(){ var k=todayKey(); if(!S.intakeLog)S.intakeLog={}; if(!S.intakeLog[k])S.intakeLog[k]={}; return S.intakeLog[k]; }
function _inkTimingLabel(it){ if(it.timing==='custom')return '⏰ '+(it.time||'--:--'); if(it.timing==='wake')return '🌅 起床後'; if(it.timing==='bed')return '🌙 睡前'; return it.timing==='before'?'🍽️ 飯前':'🍽️ 飯後'; }
function _inkSortKey(it){ if(it.timing==='wake')return '0_wake'; if(it.timing==='custom')return '1_'+(it.time||'99:99'); if(it.timing==='before')return '2_before'; if(it.timing==='after')return '3_after'; if(it.timing==='bed')return '4_bed'; return '3_after'; }
function _inkNowHM(){ var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function _inkDue(it){ if(it.timing!=='custom'||!it.time)return false; if(_inkLog()[it.id])return false; return _inkNowHM()>=it.time; }

/* ===================== 量測頁 ===================== */
function bpCat(sys,dia){
  if(sys>=180||dia>=120) return {l:'高血壓危象',c:'#b71c1c'};
  if(sys>=140||dia>=90)  return {l:'第二期高血壓',c:'#e53935'};
  if(sys>=130||dia>=80)  return {l:'第一期高血壓',c:'#fb8c00'};
  if(sys>=120&&dia<80)   return {l:'血壓升高',c:'#f9a825'};
  return {l:'正常',c:'#43a047'};
}
function mdate(t){var d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate();}
function spark(vals,color){
  if(!vals||vals.length<2)return '';
  var w=320,h=72,pad=10,n=vals.length;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals); if(mx===mn)mx=mn+1;
  var xy=vals.map(function(v,i){var x=pad+(w-2*pad)*(n>1?i/(n-1):0);var y=pad+(h-2*pad)*(1-(v-mn)/(mx-mn));return [x,y];});
  var pts=xy.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var dots=xy.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.6" fill="'+color+'"/>';}).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;margin:.5rem 0"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
}
function renderMeasure(){
  var view=document.getElementById('view'); view.innerHTML='';

    var dtxt=prev?((delta>0?'▲ +'+delta.toFixed(1):(delta<0?'▼ '+delta.toFixed(1):'＝ 0'))+' kg'):'首次紀錄';
    var dcol=delta>0?'#e53935':(delta<0?'#43a047':'var(--muted)');
    head='<div class="mbig">'+last.kg.toFixed(1)+'<small> kg</small></div><div class="msub" style="color:'+dcol+'">'+dtxt+'<span style="color:var(--muted)"> · '+mdate(last.t)+'</span></div>';
  }else{ head='<div class="msub">尚未記錄，輸入今天的體重開始吧。</div>'; }
  wc.innerHTML=head+spark(W.slice(-14).map(function(r){return r.kg;}),'#D42E3C')+
    '<div class="mrow"><input class="minput" id="w-kg" type="number" inputmode="decimal" step="0.1" placeholder="體重 (kg)"/><button class="mbtn" id="w-add">記錄</button></div>';
  view.appendChild(wc);
  if(W.length){
    var wl=el('div','card'); wl.innerHTML='<div class="mlt">最近紀錄</div>';
    W.slice(-7).reverse().forEach(function(r){
      var row=el('div','mrec'); row.innerHTML='<span>'+mdate(r.t)+'</span><b>'+r.kg.toFixed(1)+' kg</b><button class="mdel">✕</button>';
      row.querySelector('.mdel').addEventListener('click',function(){var i=S.measure.w.indexOf(r);if(i>=0)S.measure.w.splice(i,1);save();renderMeasure();});
      wl.appendChild(row);
    });
    view.appendChild(wl);
  }
  document.getElementById('w-add').addEventListener('click',function(){
    var v=parseFloat(document.getElementById('w-kg').value);
    if(!(v>0&&v<400)){toast('請輸入有效體重');return;}

  view.appendChild(el('h2','title','血壓 🩺'));

  }else{ bhead='<div class="msub">尚未記錄，輸入收縮壓 / 舒張壓開始。</div>'; }
  bc.innerHTML=bhead+
    '<div class="mrow"><input class="minput" id="bp-s" type="number" inputmode="numeric" placeholder="收縮壓"/><span class="msep">/</span><input class="minput" id="bp-d" type="number" inputmode="numeric" placeholder="舒張壓"/></div>'+
    '<div class="mrow"><input class="minput" id="bp-p" type="number" inputmode="numeric" placeholder="脈搏（選填）"/><button class="mbtn" id="bp-add">記錄</button></div>';
  view.appendChild(bc);
  if(BP.length){
    var bl=el('div','card'); bl.innerHTML='<div class="mlt">最近紀錄</div>';
    BP.slice(-7).reverse().forEach(function(r){
      var cat=bpCat(r.sys,r.dia); var row=el('div','mrec');
      row.innerHTML='<span>'+mdate(r.t)+'</span><b>'+r.sys+'/'+r.dia+'<small style="font-weight:600;color:var(--muted)"> mmHg'+(r.pulse?' · '+r.pulse:'')+'</small></b><span class="bpdot" style="background:'+cat.c+'"></span><button class="mdel">✕</button>';
      row.querySelector('.mdel').addEventListener('click',function(){var i=S.measure.bp.indexOf(r);if(i>=0)S.measure.bp.splice(i,1);save();renderMeasure();});
      bl.appendChild(row);
    });
    view.appendChild(bl);
  }
  document.getElementById('bp-add').addEventListener('click',function(){
    var s=parseInt(document.getElementById('bp-s').value,10);
    var dd=parseInt(document.getElementById('bp-d').value,10);
    var p=parseInt(document.getElementById('bp-p').value,10);
    if(!(s>0&&s<300)||!(dd>0&&dd<200)){toast('請輸入有效血壓');return;}
    var rec={t:Date.now(),sys:s,dia:dd}; if(p>0)rec.pulse=p;
    S.measure.bp.push(rec); save(); renderMeasure(); toast('已記錄 ✓');
  });

  /* =============== 進階量測（展開式對話框） =============== */
  view.appendChild(el('h2','title','進階量測 📐'));
  var ADVM=[
    {
      key:'bf', icon:'🔥', title:'體脂率',
      unit:'%', min:5, max:60, step:0.5, placeholder:'輸入體脂率 (%)',
      note:'男性理想 10–20%，女性理想 18–28%',
      sci:'體脂率是細胞控重的核心指標。脂肪細胞過多會釋放促炎因子，讓全身持續慢性發炎，粒線體效能下降。E生愛快充幫助淨化→消炎→活化，讓體脂逐步回到健康範圍。',
      cat: function(v){
        if(v<10) return {l:'偏低',c:'#1565C0'};
        if(v<18) return {l:'理想',c:'#43a047'};
        if(v<25) return {l:'正常',c:'#F9A825'};
        if(v<30) return {l:'過高',c:'#fb8c00'};
        return {l:'肥胖',c:'#e53935'};
      }
    },
    {
      key:'vf', icon:'🫀', title:'內臟脂肪',
      unit:'級', min:1, max:30, step:1, placeholder:'輸入內臟脂肪等級 (1–30)',
      note:'理想值 1–9 級（Tanita 標準）',
      sci:'內臟脂肪包圍心、肝、胰等器官，是代謝症候群的主要推手。即使體重正常，內臟脂肪過高仍會導致胰島素阻抗。空腹計時（空腹15–16小時）是降低內臟脂肪最有效的方式之一。',
      cat: function(v){
        if(v<=9)  return {l:'正常',  c:'#43a047'};
        if(v<=14) return {l:'稍高',  c:'#F9A825'};
        return {l:'過高',c:'#e53935'};
      }
    },
    {
      key:'wc', icon:'📏', title:'腰圍',
      unit:'cm', min:40, max:150, step:0.5, placeholder:'輸入腰圍 (cm)',
      note:'男性 < 90cm，女性 < 80cm',
      sci:'腰圍是內臟脂肪的外部指標，也是代謝健康最簡單的評估工具。腰圍超標代表腹部內臟脂肪堆積，心血管疾病風險升高。每天動一動 30 分鐘，搭配 811 飲食，是縮腰圍最自然的方式。',
      cat: function(v,isMale){
        var limit=isMale?90:80;
        if(v<limit) return {l:'達標',c:'#43a047'};
        if(v<limit+10) return {l:'稍超',c:'#fb8c00'};
        return {l:'超標',c:'#e53935'};
      }
    }
  ];

  if(!S.measure.adv) S.measure.adv={};

  ADVM.forEach(function(m, idx){
    var rec=S.measure.adv[m.key]||[];
    var last=rec[rec.length-1];
    var isOpen=(S.measure['_open_'+m.key]);
    var card=el('div','card');
    card.style.cssText='margin:.6rem 0;border-radius:16px;overflow:hidden;border:2px solid var(--border);padding:0;';

      var cat=m.cat(last.v, S.sex!=='F');

        +'<span style="margin-left:8px;font-size:.75rem;font-weight:800;padding:2px 10px;border-radius:20px;background:'+cat.c+'22;color:'+cat.c+'">'+cat.l+'</span>'
        +'<span style="color:var(--text2);font-size:.8rem;margin-left:8px">'+mdate(last.t)+'</span>';
    } else {
      sumLine='<span style="color:var(--muted);font-size:.9rem">尚未記錄</span>';
    }

    var headerHTML='<div onclick="window._advToggle('+idx+')" style="display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;cursor:pointer;background:var(--surface)">'

      +'<div style="font-size:.85rem;margin-top:2px">'+sumLine+'</div></div></div>'
      +'<div style="font-size:1.2rem;color:var(--brand);transition:.3s;transform:'+(isOpen?'rotate(90deg)':'rotate(0deg)')+'">›</div>'
      +'</div>';

    var bodyHTML='';
    if(isOpen){
      bodyHTML='<div style="padding:.8rem 1rem;background:var(--surface2);border-top:1px solid var(--border)">';

      /* 折線圖 */
      if(rec.length>=2){
        bodyHTML+=spark(rec.slice(-14).map(function(r){return r.v;}), '#D42E3C');
      }

      /* 說明 */
      bodyHTML+='<div style="font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:.8rem;padding:.6rem .8rem;background:rgba(212,46,60,0.06);border-radius:10px;border-left:3px solid var(--brand-l)">'
        +'<b style="color:var(--brand-d)">⚡ 細胞快充說明</b><br>'+m.sci+'</div>';

      /* 參考值說明 */
      bodyHTML+='<div style="font-size:.8rem;color:var(--text2);margin-bottom:.6rem">📌 '+m.note+'</div>';

      /* 輸入列 */
      bodyHTML+='<div class="mrow"><input class="minput" id="adv-'+m.key+'" type="number" inputmode="decimal" step="'+m.step+'" placeholder="'+m.placeholder+'"/>'
        +'<button class="mbtn" onclick="window._advRecord('+idx+')">記錄</button></div>';

      /* 最近紀錄 */
      if(rec.length){
        bodyHTML+='<div style="margin-top:.7rem">';
        rec.slice(-5).reverse().forEach(function(r){
          var cat=m.cat(r.v, S.sex!=='F');
          bodyHTML+='<div class="mrec" style="margin:.25rem 0">'
            +'<span>'+mdate(r.t)+'</span>'
            +'<b>'+r.v+' <small>'+m.unit+'</small></b>'
            +'<span style="font-size:.75rem;font-weight:800;padding:1px 8px;border-radius:16px;background:'+cat.c+'22;color:'+cat.c+'">'+cat.l+'</span>'
            +'<button class="mdel" onclick="window._advDel('+idx+','+r.t+')">✕</button>'
            +'</div>';
        });
        bodyHTML+='</div>';
      }

      /* 28控重紀錄表連結 */
      bodyHTML+='<a href="https://docs.google.com/spreadsheets/d/1vTgKfDvzWHGBZqIPO6oIhEkIEtxE2l0XJIAeSu0LWPE/edit?usp=sharing" target="_blank" style="display:block;margin-top:.8rem;padding:.65rem;border-radius:12px;background:linear-gradient(135deg,#A01E28,#D42E3C);color:#fff;font-weight:800;font-size:.92rem;text-decoration:none;text-align:center">📊 28天控重紀錄表 →</a>';
      bodyHTML+='</div>';
    }

    card.innerHTML=headerHTML+bodyHTML;
    view.appendChild(card);
  });

  /* --- 進階量測 JS 控制器 --- */
  window._advToggle=function(idx){
    var m=ADVM[idx];
    S.measure['_open_'+m.key]=!S.measure['_open_'+m.key];
    save(); renderMeasure();
  };
  window._advRecord=function(idx){
    var m=ADVM[idx];
    var v=parseFloat(document.getElementById('adv-'+m.key).value);
    if(!(v>0&&v<999)){toast('請輸入有效數值');return;}
    if(!S.measure.adv)S.measure.adv={};
    if(!S.measure.adv[m.key])S.measure.adv[m.key]=[];
    S.measure.adv[m.key].push({t:Date.now(),v:v});
    save(); renderMeasure(); toast(m.title+' 已記錄 ✓');
  };
  window._advDel=function(idx,t){
    var m=ADVM[idx];
    if(!S.measure.adv||!S.measure.adv[m.key])return;
    S.measure.adv[m.key]=S.measure.adv[m.key].filter(function(r){return r.t!==t;});
    save(); renderMeasure();
  };

  /* --- 底部說明 --- */
  view.appendChild(el('div','lead','量測值僅供個人記錄參考，診斷與用藥請諮詢醫師。'));
  view.appendChild(el('div','verse','「你們豈不知道，你們的身子就是聖靈的殿嗎？……所以，要在你們的身子上榮耀神。」（哥林多前書 6:19–20）'));
}

/* ===== 斷食提醒：音效 / 通知 / 震動 / 自動循環 ===== */
var _fac=null;
function fastUnlockAudio(){ try{ if(!_fac){var AC=window.AudioContext||window.webkitAudioContext; if(AC)_fac=new AC();} if(_fac&&_fac.state==='suspended')_fac.resume(); }catch(e){} }
function fastRequestNotify(){ try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){} }
function fastChime(kind){
  if(S.fast&&S.fast.sound===false) return;
  try{ fastUnlockAudio(); if(!_fac) return; var t0=_fac.currentTime, seq;
    if(kind==='cycle'){ seq=[[523.25,0],[659.25,.16],[783.99,.32],[1046.50,.50]]; }
    else { seq=[[784,0],[988,.16],[784,.50],[988,.66],[784,1.00],[988,1.16]]; }
    seq.forEach(function(n){ var o=_fac.createOscillator(),g=_fac.createGain(); o.type='sine'; o.frequency.value=n[0];
      var s=t0+n[1]; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.35,s+.02); g.gain.exponentialRampToValueAtTime(.0001,s+.42);
      o.connect(g); g.connect(_fac.destination); o.start(s); o.stop(s+.46); });
  }catch(e){}
}
function fastNotify(title,body){ try{ if('Notification' in window && Notification.permission==='granted'){ var n=new Notification(title,{body:body,tag:'fast321',renotify:true}); setTimeout(function(){try{n.close();}catch(e){}},9000);} }catch(e){} }
function fastAlert(kind,goalH){
  var title,short,color;
  if(kind==='goal'){ title='\uD83C\uDF89 斷食達標！'; short='已滿 '+goalH+'h，可以開始進食了'; color='#FF8F00'; }
  else if(kind==='cycle'){ title='\uD83D\uDD14 新一輪斷食開始'; short='上一輪已完成記錄，已自動換輪'; color='#388E3C'; }
  else { title='\u23F8\uFE0F 自動循環已暫停'; short='上一輪已記錄，請手動開始新一輪'; color='#546e7a'; }
  fastChime(kind==='goal'?'goal':'cycle');
  if(navigator.vibrate){ try{ navigator.vibrate(kind==='goal'?[300,150,300,150,300]:[200,100,200]); }catch(e){} }
  fastNotify(title, kind==='goal'?('已完成 '+goalH+' 小時斷食，可以開始進食了。願神的供應夠你用！'):kind==='cycle'?'上一輪斷食已完成並記錄，已自動開始新一輪。倚靠主，繼續得勝！':'上一輪斷食已記錄。因間隔較久，已暫停自動循環，請手動開始新一輪。');
  toast(title+'｜'+short, color);
}
function fastWatch(){
  var f=S.fast; if(!f||!f.cur) return;
  var now=Date.now(), goalMs=f.cur.goalH*3600000, cycleMs=86400000, elapsed=now-f.cur.start;
  if(elapsed>=goalMs && !f.cur.nGoal){ f.cur.nGoal=true; save(); fastAlert('goal', f.cur.goalH); }
  if(elapsed>=cycleMs){
    f.log.push({start:f.cur.start,end:f.cur.start+goalMs,goalH:f.cur.goalH,hours:f.cur.goalH,done:true});
    if(elapsed>=2*cycleMs){ f.cur=null; save(); fastAlert('stop'); }
    else { f.cur={start:f.cur.start+cycleMs,goalH:f.goal,nGoal:false,nCycle:false}; save(); fastAlert('cycle', f.goal); }
    if(window.__tab==='fast' && typeof renderFasting==='function') renderFasting();
  }
}

function dayPct(o){if(!o)return 0;var s=0;PILLARS.forEach(function(p){var v=o[p.k]||0;var r=p.type==='toggle'?(v?1:0):(p.type==='charge'?Math.min(v/p.goal,1):Math.min(v/goalOf(p),1));s+=r;});return Math.round(s/PILLARS.length*100);}

  var fl=(S.fast&&S.fast.log)||[], fdone=fl.filter(function(o){return o.done;}).length;

  EMOTIONS.pos.forEach(function(e){
    var sel=S.emo===e.k;
    html += '<button class="ew-btn2'+(sel?' sel':'')+'" onclick="window._se(this.dataset.emokey)" data-emokey="'+e.k+'" style="color:'+e.c+';'+(sel?'background:'+e.c+'18;':'')+'"><span class="ew-em">'+e.e+'</span><span class="ew-lb" style="color:'+e.c+';">'+e.l+'</span></button>';

  /* 中性8 */

  html += '<div class="ew-grid">';
  EMOTIONS.neu.forEach(function(e){
    var sel=S.emo===e.k;
    html += '<button class="ew-btn2'+(sel?' sel':'')+'" onclick="window._se(this.dataset.emokey)" data-emokey="'+e.k+'" style="color:'+e.c+';'+(sel?'background:'+e.c+'18;':'')+'"><span class="ew-em">'+e.e+'</span><span class="ew-lb" style="color:'+e.c+';">'+e.l+'</span></button>';

  html += '</div>';

  /* 負向8 */
  html += '<div style="font-size:15px;font-weight:800;color:#EF5350;letter-spacing:1px;margin-bottom:5px;margin-top:8px;">❤️‍🔥 需要轉化的情緒</div>';
  html += '<div class="ew-grid">';
  EMOTIONS.neg.forEach(function(e){
    var sel=S.emo===e.k;
    html += '<button class="ew-btn2'+(sel?' sel':'')+'" onclick="window._se(this.dataset.emokey)" data-emokey="'+e.k+'" style="color:'+e.c+';'+(sel?'background:'+e.c+'18;':'')+'"><span class="ew-em">'+e.e+'</span><span class="ew-lb" style="color:'+e.c+';">'+e.l+'</span></button>';
  });
  html += '</div>';
  html += '</div>'; /* end card */

  /* ── 步驟二：探索（正向=深化，其他=根源）── */
  if(S.emo){
    html += '<div class="emo-card2 step-in" style="border-color:'+(curEmo?curEmo.c+'40':'rgba(0,0,0,0.07)')+';"><div class="emo-sec" style="color:#1976D2;">🔍 第二步 · 深入探索</div>';

    if(isPos(S.emo)){
      /* 正向情緒：深化問題 */
      var exp = POS_EXPLORE[S.emo] || {q:'這個感受帶給你什麼？', opts:['讓我感到更親近神','提醒我神的恩典','給我力量繼續走','讓我想感謝神','不確定，只是感覺好']};
      html += '<div style="font-size:16px;color:#546e7a;margin-bottom:10px;line-height:1.7;">你選擇了「'+(curEmo?curEmo.l:'')+curEmo.e+'」<br><strong>'+exp.q+'</strong></div>';
      html += '<div style="display:flex;flex-direction:column;gap:8px;">';
      exp.opts.forEach(function(opt){
        var sel=S.posOpt===opt;
        html += '<button onclick="window._spo(this.dataset.spopt)" data-spopt="'+opt.replace(/"/g,"&quot;")+'" style="padding:9px 12px;border-radius:10px;text-align:left;font-size:15px;font-weight:600;border:1.5px solid '+(sel?'#4CAF50':'rgba(0,0,0,0.08)')+';background:'+(sel?'rgba(76,175,80,0.1)':'#fff')+';color:'+(sel?'#2e7d32':'#37474F')+';cursor:pointer;display:flex;align-items:center;gap:8px;"><span style="font-size:16px;">'+(sel?'✅':'○')+'</span>'+opt+'</button>';
      });
      html += '</div>';
      html += '<div style="margin-top:10px;padding:10px 12px;background:rgba(76,175,80,0.07);border-radius:10px;font-size:15px;color:#2e7d32;line-height:1.7;">💡 正向情緒也要辨識！感謝神賜這情緒，並問自己如何讓這果子繼續生長滋養別人。</div>';
    } else {
      /* 負面/中性：根源探索 */
      html += '<div style="font-size:16px;color:#546e7a;margin-bottom:10px;">這個「'+(curEmo?curEmo.l:'')+'」的感受，最可能來自哪裡？</div>';

      ROOTS.forEach(function(r){
        var sel=S.root===r.k;
        html += '<button class="root-btn2'+(sel?' sel':'')+'" onclick="window._sr(this.dataset.srkey)" data-srkey="'+r.k+'"><span style="font-size:18px;">'+r.ic+'</span><span>'+r.l+'</span></button>';
      });
      html += '</div>';
    }
    html += '</div>';
  }

  /* ── 步驟三：記錄心聲 ── */
  var step3ready = S.emo && (isPos(S.emo) ? S.posOpt : S.root);
  if(step3ready){
    html += '<div class="emo-card2 step-in"><div class="emo-sec" style="color:#00796B;">📝 第三步 · 記錄心聲</div>';
    html += '<textarea id="emo-note2" rows="3" placeholder="把此刻感受誠實寫下來...神看你的心，比你更了解你。" style="width:100%;padding:10px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);font-size:15px;outline:none;resize:none;font-family:inherit;line-height:1.8;background:'+(window.__isDark()?'rgba(255,255,255,0.06)':'#f8fdf8')+';color:'+(window.__isDark()?'#e8f5e9':'inherit')+';box-sizing:border-box;" onchange="window._en(this.value)">'+S.emoNote+'</textarea>';

    html += '</div>';
  }

  /* ── 步驟四：情緒轉化逐步引導 ── */
  if(S.emo){
    html += renderTxWizard(curEmo);
  }

  /* ── 趨勢 ── */
  html += renderEmoTrend();

  return html;
}

     btn:'✦ 讓耶穌作王', bStyle:'background:rgba(212,46,60,0.15);border:1.5px solid #D42E3C;color:#A01E28;'
    },

     isFruit:true

    html += '<button data-txstart="1" style="margin-bottom:12px;width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,#E91E63,#7B1FA2);border:none;color:#fff;font-size:15px;font-weight:900;cursor:pointer;letter-spacing:0.5px;">🚀 開始情緒轉化引導</button>';

    var isLocked= S.txStep < idx+1 && !isDone;

    var bgCol  = isDone||isActive ? step.color : '#B0BEC5';

    html += '<div class="sw-step" style="opacity:'+opacity+';">';

    html += '<div class="sw-title" style="color:'+(isDone||isActive?step.color:'#5d6b72')+';">'+step.icon+' '+step.title+'</div>';

        } else {
          if(step.extra) actHtml += step.extra;
          actHtml += '<button data-txnext="'+step.k+'" style="margin-top:8px;padding:9px 18px;border-radius:10px;'+step.bStyle+'font-size:15px;font-weight:800;cursor:pointer;">'+step.btn+'</button>';
        }
        html += '<div class="sw-action-area">'+actHtml+'</div>';
      }
      if(isDone){
        if(idx===4){
          html += '<div style="margin-top:8px;padding:8px 12px;background:rgba(233,30,99,0.08);border-radius:10px;font-size:15px;color:#C2185B;">已完成！繼續操練聖靈果子。</div>';
        } else {
          html += '<div style="margin-top:6px;padding:6px 10px;background:rgba(76,175,80,0.08);border-radius:10px;font-size:15px;color:#2e7d32;">✓ 已完成這步驟！繼續下一步。</div>';
        }
      }
    } else {
      html += '<div style="font-size:15px;color:#5d6b72;margin-top:2px;">完成上一步後解鎖</div>';
    }
    html += '</div></div>';
    if(idx<4) html += '';
  });

  html += '</div></div>';
  return html;
}

/* ── 壓力Tab ── */

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  [{ic:'😤',s:'情緒易怒煩躁'},{ic:'💭',s:'思緒轉不停'},{ic:'😴',s:'睡眠品質差'},{ic:'🤢',s:'胃部不適'},
   {ic:'🫀',s:'心跳加速'},{ic:'🧊',s:'肌肉緊繃'},{ic:'😶',s:'注意力渙散'},{ic:'😔',s:'提不起勁'}].forEach(function(sy){
     var sel=S.strSym.indexOf(sy.s)>=0;
     html += '<button onclick="window._sym(this.dataset.sym)" data-sym="'+sy.s+'" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:'+(sel?'rgba(239,83,80,0.12)':'rgba(239,83,80,0.04)')+';border:1.5px solid '+(sel?'#EF5350':'rgba(239,83,80,0.15)')+';cursor:pointer;-webkit-tap-highlight-color:transparent;">'

    {k:'journal',ic:'✍️', t:'感恩日記', sub:'改變眼光的操練',c:'#E91E63', bg:'rgba(233,30,99,0.08)'},
  ];
  html += '<div class="emo-card2"><div class="emo-sec" style="color:#1565C0;">🧰 第三步 · 紓壓工具箱</div>';
  html += '<div class="relief-grid2">';
  tools.forEach(function(t){

function buildDays14(){
  var days=[];
  for(var i=13;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    days.push({k:k,recs:S.emoLog.filter(function(r){return r.date===k;})});
  }
  return days;
}

/* 深呼吸 */
function runBreathCycle(){
  S.breathPhase='inhale'; updateBreath();
  S.breathTimer=setTimeout(function(){
    S.breathPhase='hold'; updateBreath();
    S.breathTimer=setTimeout(function(){
      S.breathPhase='exhale'; updateBreath();
      S.breathTimer=setTimeout(function(){
        S.breathCount++;
        if(S.breathCount < 5){
          runBreathCycle(); // auto-continue next cycle
        } else {
          // Done 5 cycles
          S.breathPhase='idle'; S.breathCount=0;
          updateBreath();
          S.breathTimer=null;
          toast('🌬️ 5次深呼吸完成！願神的平安充滿你的心。','#4CAF50');
        }
      },8000);
    },7000);
  },4000);
}
window._sb=function(){
  // Click to start (idle) or stop (during any phase)
  if(S.breathTimer){
    clearTimeout(S.breathTimer); S.breathTimer=null;
    S.breathPhase='idle'; S.breathCount=0;
    updateBreath(); return;
  }
  if(S.breathPhase==='idle'){
    runBreathCycle();
  }
};

  var c=document.getElementById('breath-circle2');

  if(n)n.textContent=S.breathPhase==='idle'?'點擊開始 · 自動完成5次':'第 '+(S.breathCount+1)+' / 5 次';

  var timer=ctrl?setTimeout(function(){try{ctrl.abort();}catch(_){}} ,45000):null;
  fetch(XZ_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    signal:ctrl?ctrl.signal:undefined,
    body:JSON.stringify({model:XZ_MODEL,max_tokens:1000,system:xzSystem(),messages:chat.msgs.map(function(m){return {role:m.role,content:m.text};})})
  }).then(function(res){ if(!res.ok) throw new Error("HTTP "+res.status); return res.json(); })
  .then(function(data){
    var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n").trim();
    if(!text) text="小智一時想不出合適的話，換個方式再問問看好嗎？";
    chat.msgs.push({role:"assistant",text:text});
  }).catch(function(e){
    var aborted=e&&(e.name==="AbortError");
    chat.msgs.push({role:"assistant",text:(aborted?"小智等候得有點久，先暫停一下 \ud83d\ude4f 請稍後再試。":"小智暫時連不上線，請稍後再試 \ud83d\ude4f")});
  }).then(function(){ if(timer)clearTimeout(timer); chat.busy=false; renderChat(); xzScrollBottom(); });
}

function xzFavSig(q,a){ return String(q||"").replace(/\s+/g,"").slice(0,80)+"\u27f6"+String(a||"").replace(/\s+/g,"").slice(0,120); }
function xzIsFav(q,a){ var F=XZ.favs||[],sig=xzFavSig(q,a); for(var k=0;k<F.length;k++){ if(xzFavSig(F[k].q,F[k].a)===sig) return true; } return false; }
function xzFavsHTML(){
  var F=XZ.favs||[];
  var h='<div class="xz-favs-head"><button class="xz-back-chat" onclick="xzToggleFavs()">\u2039 \u8fd4\u56de\u5c0d\u8a71</button><div class="xz-favs-title">\u2b50 \u6211\u7684\u6536\u85cf\uff08'+F.length+'\uff09</div></div>';
  if(!F.length){ h+='<div class="xz-favs-empty">\u9084\u6c92\u6709\u6536\u85cf\u3002<br>\u5728\u559c\u6b61\u7684\u56de\u7b54\u4e0b\u65b9\u9ede\u300c\u2606 \u6536\u85cf\u300d\uff0c\u65e5\u5f8c\u5c31\u80fd\u5728\u9019\u88e1\u7ffb\u95b1 \ud83d\ude4f</div>'; return h; }
  F.forEach(function(f,idx){
    h+='<div class="xz-fav-card">'+(f.q?('<div class="xz-fav-q">'+esc(f.q)+'</div>'):'')+'<div class="xz-fav-a">'+xzFmt(f.a)+'</div>'
      +'<div class="xz-acts"><button class="xz-act" onclick="xzFavRemove('+idx+')">\ud83d\uddd1 \u79fb\u9664</button></div></div>';
  });
  return h;
}

function renderChat(){
  var host=document.getElementById("xiaozhi");
  if(!host) return;
  var fabStyle = XZ.pos ? ('left:'+XZ.pos.x+'px;top:'+XZ.pos.y+'px;right:auto;bottom:auto') : '';
  var html='<button class="xz-fab" style="'+fabStyle+'" onclick="if(!window.__xzJustDragged)xzOpen()"><span class="xz-fab-ic">\ud83d\udcac</span><span class="xz-fab-tx">\u5c0f\u667a</span></button>';
  if(chat.open){
    var intro="\u60a8\u597d\uff0c\u6211\u662f\u5c0f\u667a \u26a1 \u611b\u83f2\u4e9e\u7d30\u80de\u5feb\u5145\u7ad9\u7684 AI \u5065\u5eb7\u6559\u7df4\u3002\u95dc\u65bc\u7d30\u80de\u5feb\u5145\u3001811\u98f2\u98df\u3001\u7a7a\u8179\u65b7\u98df\u3001\u7761\u7720\u904b\u52d5\u3001\u9ad4\u91cd\u8207\u8eab\u5fc3\u5065\u5eb7\uff0c\u90fd\u53ef\u4ee5\u554f\u6211\uff0c\u6211\u9663\u4f60\u4e00\u6b65\u6b65\u627e\u56de\u6eff\u96fb\u7684\u6d3b\u529b\u3002";
    var msgsHtml='';
    if(chat.favView){ msgsHtml=xzFavsHTML(); }
    else{
      msgsHtml='<div class="xz-msg xz-ai"><div class="xz-bubble">'+esc(intro)+'</div></div>';
      chat.msgs.forEach(function(m,mi){
        if(m.role==="user"){
          msgsHtml+='<div class="xz-msg xz-me"><div class="xz-bubble">'+xzFmt(m.text)+'</div></div>';
        }else{
          var _favq=(mi>0&&chat.msgs[mi-1]&&chat.msgs[mi-1].role==="user")?chat.msgs[mi-1].text:"";
          var _isfav=xzIsFav(_favq,m.text);
          var _col=!!m.collapsed;
          var _body=_col?('<div class="xz-collapsed-preview">'+esc(String(m.text||"").replace(/\s+/g," ").slice(0,28))+'\u2026</div>'):xzFmt(m.text);
          msgsHtml+='<div class="xz-msg xz-ai"><div class="xz-bubble">'+_body
            +'<div class="xz-acts">'
            +'<button class="xz-act" onclick="xzToggleCollapse('+mi+')">'+(_col?'\u25b8 \u5c55\u958b':'\u25be \u6536\u5408')+'</button>'
            +'<button class="xz-act'+(_isfav?' on':'')+'" onclick="xzFav('+mi+')">'+(_isfav?'\u2605 \u5df2\u6536\u85cf':'\u2606 \u6536\u85cf')+'</button>'
            +'<button class="xz-act" onclick="xzDelMsg('+mi+')">\ud83d\uddd1 \u522a\u9664</button>'
            +'</div></div></div>';
        }
      });
      if(chat.busy) msgsHtml+='<div class="xz-msg xz-ai"><div class="xz-bubble xz-typing"><span></span><span></span><span></span></div></div>';
      var pick=function(label){
        var h='<div class="xz-cat-label">'+esc(label)+'</div>';
        h+='<div class="xz-cats">'+XZ_TOPICS.map(function(t,ci){return '<button class="xz-cat'+(chat.topic===ci?' active':'')+'" onclick="xzTopic('+ci+')">'+esc(t.c)+'</button>';}).join("")+'</div>';
        if(chat.topic>=0&&XZ_TOPICS[chat.topic]){
          h+='<div class="xz-quicks xz-topic-qs">'+XZ_TOPICS[chat.topic].qs.map(function(q,qi){return '<button class="xz-quick" onclick="xzTopicAsk('+chat.topic+','+qi+')">'+esc(q)+'</button>';}).join("")+'</div>';
        }
        return h;
      };
      if(chat.msgs.length===0){
        msgsHtml+='<div class="xz-quicks">'+xzStarters().map(function(q,i){return '<button class="xz-quick" onclick="xzQuick('+i+')">'+esc(q)+'</button>';}).join("")+'</div>';
        msgsHtml+=pick("\u9078\u4e00\u500b\u5065\u5eb7\u7bc4\u7587 \u00b7 \u9ede\u7bc4\u7587\u770b 20 \u500b\u63d0\u554f");
      }else if(!chat.busy){
        msgsHtml+='<div class="xz-home-sep">\u00b7 \u524d\u9762\u7684\u554f\u7b54\u5df2\u4fdd\u7559 \u00b7</div>';
        msgsHtml+=pick("\u63db\u500b\u7bc4\u7587\uff0e\u56de\u9019\u88e1\u7e7c\u7e8c\u767c\u554f");
      }
    }
    html+='<div class="xz-overlay" onclick="if(event.target===this)xzClose()">'
      +'<div class="xz-sheet">'
        +'<div class="xz-head"><div class="xz-head-l"><span class="xz-ava">\u26a1</span><div><div class="xz-name">\u5c0f\u667a</div><div class="xz-role">AI \u5065\u5eb7\u6559\u7df4 \u00b7 \u9663\u4f60\u7d30\u80de\u5feb\u5145</div></div></div>'
        +'<div class="xz-head-r"><button class="xz-hbtn" onclick="xzToggleFavs()" aria-label="\u6536\u85cf">\u2b50</button><button class="xz-hbtn" onclick="xzClearAll()" aria-label="\u91cd\u65b0\u958b\u59cb">\ud83c\udfe0</button><button class="xz-x" onclick="xzClose()">\u2715</button></div></div>'
        +'<div class="xz-msgs" id="xz-msgs">'+msgsHtml+'</div>'
        +'<div class="xz-foot"><input id="xz-input" class="xz-input" type="text" placeholder="\u5411\u5c0f\u667a\u63d0\u554f\u2026" onkeydown="if(event.key===\'Enter\')xzSend()"><button class="xz-send" onclick="xzSend()">\u9001\u51fa</button></div>'
        +'<div class="xz-note">\u5c0f\u667a\u662f AI \u5065\u5eb7\u6559\u7df4\uff0c\u63d0\u4f9b\u4e00\u822c\u4fdd\u5065\u53c3\u8003\uff0c\u4e0d\u80fd\u53d6\u4ee3\u5c08\u696d\u91ab\u7642\u8a3a\u65b7\u8207\u6cbb\u7642\u3002\u8eab\u9ad4\u4e0d\u9069\u8acb\u8ae2\u8a62\u91ab\u5e2b \ud83d\ude4f</div>'
      +'</div></div>';
  }
  host.innerHTML=html;
  var fabEl=host.querySelector(".xz-fab");
  if(fabEl){
    if(XZ.pos){
      var w=fabEl.offsetWidth||110,h2=fabEl.offsetHeight||48;
      var cx=Math.max(6,Math.min(XZ.pos.x,window.innerWidth-w-6));
      var cy=Math.max(6,Math.min(XZ.pos.y,window.innerHeight-h2-6));
      if(cx!==XZ.pos.x||cy!==XZ.pos.y){fabEl.style.left=cx+"px";fabEl.style.top=cy+"px";XZ.pos={x:cx,y:cy};}
    }
    attachFabDrag(fabEl);
  }
}

function attachFabDrag(fab){
  if(!fab || fab.__dragWired) return; fab.__dragWired=true;
  var sx=0,sy=0,ox=0,oy=0,moved=false,dragging=false;
  fab.addEventListener("pointerdown",function(e){
    var r=fab.getBoundingClientRect();
    sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top; moved=false; dragging=true;
    fab.style.transition="none";
    try{fab.setPointerCapture(e.pointerId);}catch(_){}
  });
  fab.addEventListener("pointermove",function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved && (Math.abs(dx)>4||Math.abs(dy)>4)) moved=true;
    if(!moved) return;
    var w=fab.offsetWidth, h=fab.offsetHeight;
    var nx=Math.max(6,Math.min(ox+dx, window.innerWidth-w-6));
    var ny=Math.max(6,Math.min(oy+dy, window.innerHeight-h-6));
    fab.style.left=nx+"px"; fab.style.top=ny+"px"; fab.style.right="auto"; fab.style.bottom="auto";
  });
  function endDrag(e){
    if(!dragging) return; dragging=false; fab.style.transition="";
    try{fab.releasePointerCapture(e.pointerId);}catch(_){}
    if(moved){
      var r=fab.getBoundingClientRect();
      XZ.pos={x:Math.round(r.left), y:Math.round(r.top)}; xzPersist();
      window.__xzJustDragged=true; setTimeout(function(){window.__xzJustDragged=false;},350);
    }
  }
  fab.addEventListener("pointerup",endDrag);
  fab.addEventListener("pointercancel",endDrag);
}

window.xzOpen=function(){chat.open=true;renderChat();xzScrollBottom();setTimeout(function(){var i=document.getElementById("xz-input");if(i&&i.focus)i.focus();},60);};
window.xzClose=function(){chat.open=false;renderChat();};
window.xzToggleCollapse=function(i){ if(chat.msgs[i]){ chat.msgs[i].collapsed=!chat.msgs[i].collapsed; renderChat(); } };
window.xzDelMsg=function(i){ if(!chat.msgs[i])return; if(!window.confirm("\u522a\u9664\u9019\u5247\u5c0d\u8a71\uff1f"))return; var from=i,cnt=1; if(i>0&&chat.msgs[i-1]&&chat.msgs[i-1].role==="user"){from=i-1;cnt=2;} chat.msgs.splice(from,cnt); renderChat(); };
window.xzSend=function(){var i=document.getElementById("xz-input");if(!i)return;var t=(i.value||"").trim();if(!t||chat.busy)return;chat.favView=false;chat.msgs.push({role:"user",text:t});i.value="";renderChat();xzScrollBottom();xzCall();};
window.xzQuick=function(idx){if(chat.busy)return;var t=xzStarters()[idx];if(!t)return;chat.favView=false;chat.msgs.push({role:"user",text:t});renderChat();xzScrollBottom();xzCall();};
window.xzTopic=function(ci){chat.topic=(chat.topic===ci?-1:ci);renderChat();var m=document.getElementById("xz-msgs");if(m&&chat.topic>=0){var qs=m.querySelector(".xz-topic-qs");if(qs)qs.scrollIntoView({block:"nearest",behavior:"smooth"});}};
window.xzTopicAsk=function(ci,qi){if(chat.busy)return;var t=(XZ_TOPICS[ci]&&XZ_TOPICS[ci].qs[qi]);if(!t)return;chat.topic=-1;chat.favView=false;chat.msgs.push({role:"user",text:t});renderChat();xzScrollBottom();xzCall();};
window.xzFav=function(mi){ var m=chat.msgs[mi]; if(!m)return; var q=(mi>0&&chat.msgs[mi-1]&&chat.msgs[mi-1].role==="user")?chat.msgs[mi-1].text:""; var a=m.text||""; if(!XZ.favs)XZ.favs=[]; var sig=xzFavSig(q,a),idx=-1; for(var k=0;k<XZ.favs.length;k++){ if(xzFavSig(XZ.favs[k].q,XZ.favs[k].a)===sig){idx=k;break;} } if(idx>=0){ XZ.favs.splice(idx,1); xzToast("\u5df2\u79fb\u9664\u6536\u85cf"); } else { XZ.favs.unshift({q:q,a:a,t:Date.now()}); xzToast("\u2b50 \u5df2\u6536\u85cf"); } xzPersist(); renderChat(); };
window.xzFavRemove=function(idx){ if(!XZ.favs)return; if(!window.confirm("\u5f9e\u6536\u85cf\u79fb\u9664\u9019\u5247\u554f\u7b54\uff1f"))return; XZ.favs.splice(idx,1); xzPersist(); renderChat(); };
window.xzToggleFavs=function(){ chat.favView=!chat.favView; renderChat(); var m=document.getElementById("xz-msgs"); if(m)m.scrollTop=0; };
window.xzClearAll=function(){ if(chat.msgs.length && !window.confirm("\u8981\u6e05\u7a7a\u76ee\u524d\u6240\u6709\u554f\u7b54\u3001\u91cd\u65b0\u958b\u59cb\u55ce\uff1f\uff08\u5df2\u6536\u85cf\u7684\u4e0d\u53d7\u5f71\u97ff\uff09"))return; chat.msgs=[]; chat.topic=-1; chat.favView=false; renderChat(); };

renderChat();
})();
</script>
