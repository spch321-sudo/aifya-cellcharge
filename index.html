:root{

  --brand:#D42E3C; --brand-d:#A01E28; --brand-l:#F26430;
  --hero:linear-gradient(135deg,#A01E28,#D42E3C 55%,#F26430);

}
html[data-theme="dark"]{
  --bg:#1a0a0b; --surface:#2a1215; --surface2:#200d0f;

}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",sans-serif;
  line-height:1.55;transition:background .25s,color .25s;}
.wrap{max-width:560px;margin:0 auto;padding:12px 14px calc(140px + env(safe-area-inset-bottom));}
.appbar{background:var(--bg);
  padding:6px 2px 8px;display:flex;align-items:center;gap:8px;}
.appbar .brand{font-size:1.15rem;font-weight:800;color:var(--brand-d);}
.appbar .sec{font-size:.72rem;font-weight:800;letter-spacing:2px;color:var(--brand-l);opacity:.8;}
.card{background:var(--surface);border-radius:16px;padding:1rem;margin:.7rem 0;
  box-shadow:var(--shadow);border:1px solid var(--border);}
h2.title{font-size:1.15rem;font-weight:800;color:var(--brand-d);margin:1.1rem 2px .2rem;}
.lead{font-size:.82rem;color:var(--muted);margin:0 2px .5rem;}

/* hero ring */
.hero{text-align:center;}
.hero .date{color:var(--muted);font-size:.86rem;}
.ring-wrap{position:relative;width:148px;height:148px;margin:.4rem auto .2rem;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-wrap .mid{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.ring-wrap .pct{font-size:2rem;font-weight:800;color:var(--brand-d);line-height:1;}
.ring-wrap .pl{font-size:.78rem;color:var(--muted);margin-top:2px;}
.verse{background:var(--surface2);border-left:4px solid var(--brand-l);border-radius:12px;
  padding:.7rem .85rem;margin-top:.7rem;color:var(--brand-d);font-size:.92rem;font-style:italic;text-align:center;}

/* pillar */
.pillar{display:flex;gap:.7rem;align-items:flex-start;}
.pillar .ic{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:1.5rem;background:var(--surface2);}
.pillar .body{flex:1;min-width:0;}
.pillar .row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.pillar .nm{font-size:1.05rem;font-weight:800;}
.pillar .en{font-size:.82rem;color:var(--muted);font-weight:500;margin-left:5px;}
.pillar .goal{font-size:.92rem;color:var(--muted);font-weight:700;white-space:nowrap;}
.pillar .goal.done{color:var(--brand);}
.pillar .tip{font-size:.8rem;color:var(--muted);margin:.2rem 0 .5rem;}
.bar{height:7px;background:var(--track);border-radius:4px;overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:4px;transition:width .35s;}
.counter{display:flex;align-items:center;gap:.8rem;margin-top:.55rem;}
.counter button{width:42px;height:42px;border-radius:50%;border:none;font-size:1.4rem;
  font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.counter .v{font-size:1.3rem;font-weight:800;min-width:2.2rem;text-align:center;}
.counter .minus{background:var(--track);color:var(--text2);}
.toggle-btn{margin-top:.55rem;width:100%;padding:.6rem;border-radius:12px;border:2px solid var(--border);
  background:var(--surface2);color:var(--muted);font-size:1rem;font-weight:700;cursor:pointer;}
.toggle-btn.on{border-color:transparent;color:#fff;}

/* rainbow */
.arc{display:flex;gap:5px;justify-content:center;margin:.2rem 0 .7rem;}
.seg{flex:1;height:18px;border-radius:10px;background:var(--track);transition:.25s;}
.cnt{font-size:2rem;font-weight:800;color:var(--brand-d);}
.cnt small{font-size:1rem;font-weight:700;color:var(--muted);}
.msg{font-size:.95rem;color:var(--brand);font-weight:700;min-height:1.3rem;margin-top:.2rem;}
.sub{font-size:.8rem;color:var(--muted);}
.food{display:flex;align-items:center;gap:.7rem;background:var(--surface);border:2px solid var(--border);
  border-radius:16px;padding:.7rem .8rem;margin:.5rem 0;cursor:pointer;transition:.15s;}
.food .dot{width:28px;height:28px;border-radius:50%;flex:0 0 auto;border:2px solid rgba(0,0,0,.06);}
.food .b{flex:1;min-width:0;}
.food .nm{font-size:1.05rem;font-weight:800;}
.food .ef{font-size:.82rem;color:var(--muted);font-weight:600;}
.food .nut{font-size:.76rem;color:var(--muted);margin-top:1px;}
.food .more{font-size:.76rem;color:var(--brand-l);font-weight:700;margin-top:3px;display:inline-block;}
.food .detail{display:none;font-size:.8rem;color:var(--text2);padding-top:4px;}
.food .detail.show{display:block;}
.food .detail b{color:var(--brand-d);}
.food .detail .dgrp{margin-top:.4rem;}
.food .detail .dgrp b{display:block;font-size:.8rem;color:var(--brand-d);margin-bottom:.3rem;}
.food .detail .fd{display:flex;flex-wrap:wrap;gap:.4rem;}
.food .fchip.on{background:var(--cc);border-color:var(--cc);color:#fff;}
.food.pearl .fchip.on{background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border-color:#d2ccbd;color:#6b6452;}
.food.pearl.on .mk{background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border-color:#d2ccbd;color:#6b6452;}
@keyframes celebPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes burstRing{0%{opacity:0.9;transform:translate(-50%,-50%) scale(0.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
@keyframes confettiShoot{0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) rotate(0deg) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) translate(var(--tx),calc(var(--ty) + 120px)) rotate(720deg) scale(0.3)}}
.food .mk{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--track);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--track);font-weight:900;}
.food.on{border-color:var(--cc);background:var(--ccbg);}
.food.on .mk{border-color:var(--cc);background:var(--cc);color:#fff;}
.sf{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:.7rem .8rem;margin:.5rem 0;}
.sf .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.sf .cat{font-size:1rem;font-weight:800;color:var(--brand-d);}
.sf .fd{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.fchip{border:2px solid var(--border);background:var(--surface);color:var(--text2);border-radius:999px;padding:.34rem .72rem;font-size:.88rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s;}
.fchip.on{background:var(--brand);border-color:var(--brand);color:#fff;}
.sfreset{margin-top:.55rem;border:none;background:none;color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer;padding:2px 0;}
.sf .ef{font-size:.78rem;color:var(--muted);margin-top:2px;}
.chk{flex:0 0 auto;border:2px solid var(--border);color:var(--muted);background:var(--surface);
  border-radius:999px;padding:.35rem .7rem;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.chk.on{background:var(--brand);border-color:var(--brand);color:#fff;}

/* settings */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row .l{font-size:1rem;font-weight:700;}
.set-row .d{font-size:.78rem;color:var(--muted);margin-top:2px;}
.seg-ctrl{display:flex;background:var(--surface2);border-radius:12px;padding:3px;gap:3px;}
.seg-ctrl button{border:none;background:none;padding:.4rem .7rem;border-radius:10px;font-size:.9rem;
  font-weight:700;color:var(--muted);cursor:pointer;}
.seg-ctrl button.on{background:var(--brand);color:#fff;}
.switch{width:52px;height:30px;border-radius:16px;background:var(--track);border:none;position:relative;cursor:pointer;transition:.2s;}
.switch.on{background:var(--brand);}
.switch i{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;}
.switch.on i{left:25px;}
.btn{display:block;width:100%;padding:.7rem;border-radius:12px;border:none;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;}
.btn.primary{background:var(--brand);color:#fff;}
.btn.ghost{background:var(--surface2);color:var(--brand-d);border:1px solid var(--border);}
.idbox{background:var(--surface2);border-radius:12px;padding:.7rem .85rem;margin-top:.5rem;text-align:center;}
.idbox .id{font-size:1.5rem;font-weight:800;letter-spacing:3px;color:var(--brand-d);font-family:monospace;}

/* emotion */
.emo-cat{margin-top:.7rem;}
.emo-cat .ch{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:800;margin:.3rem 2px;}
.emo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
.emo{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:.55rem .2rem;text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.emo .ee{font-size:1.6rem;line-height:1.1;}
.emo .en2{font-size:.78rem;font-weight:700;margin-top:2px;color:var(--text2);}
.emo.sel{border-color:var(--ec);background:var(--ecbg);}
.emo.sel .en2{color:var(--ec);}
.guide .gn{font-size:1.1rem;font-weight:800;color:var(--brand-d);}
.step{display:flex;gap:.55rem;margin:.5rem 0;}
.step .num{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;font-size:.85rem;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.step .st{font-weight:800;color:var(--brand-d);font-size:.98rem;}
.step .sx{font-size:.9rem;color:var(--text);margin-top:1px;line-height:1.5;}
.breath{text-align:center;}
.breath .circle{width:120px;height:120px;border-radius:50%;margin:.7rem auto;background:radial-gradient(circle,var(--brand-l),var(--brand));animation:breathe 8s ease-in-out infinite;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.1rem;}
@keyframes breathe{0%,100%{transform:scale(.72)}50%{transform:scale(1.05)}}
#ns-emotion-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.38); backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}
#ns-emotion-overlay.open { display:flex; flex-direction:column; }
#ns-emotion-sheet {
  position:absolute; bottom:0; left:0; right:0;
  max-width:480px; margin:0 auto; height:93vh;
  background:#fff; border-radius:20px 22px 0 0;
  display:flex; flex-direction:column; overflow:hidden;
  animation:slideUpEmo2 0.36s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes slideUpEmo2 { from{transform:translateY(100%)} to{transform:translateY(0)} }
body[data-dark="1"] #ns-emotion-sheet { background:#131a13; color:#e8f5e9; }
body[data-dark="1"] .emo-card2 { background:rgba(255,255,255,0.05)!important; border-color:rgba(255,255,255,0.1)!important;  width:100%; box-sizing:border-box;
}
/* 夜間模式補強：情緒／壓力模組 + 飲食選取卡（使用與變數相同的 html[data-theme=dark] 選擇器） */
html[data-theme="dark"] .emo-card2{background:var(--surface)!important;border-color:var(--border)!important;color:var(--text);box-shadow:none!important;}
html[data-theme="dark"] .emo-tab2{background:rgba(255,255,255,0.08);color:var(--text2);}
html[data-theme="dark"] .ew-btn2{background:rgba(255,255,255,0.06);}
html[data-theme="dark"] .ew-lb{color:var(--text);}
html[data-theme="dark"] .root-btn2{background:rgba(255,255,255,0.06);border-color:var(--border);color:var(--text2);}
html[data-theme="dark"] .ss-scl{background:rgba(255,255,255,0.06);}
html[data-theme="dark"] .ss-btn2{background:rgba(255,255,255,0.06);border-color:var(--border);}
html[data-theme="dark"] .ss-btn2 .sl{color:var(--text2);}
html[data-theme="dark"] .sw-desc{color:var(--text2);}
html[data-theme="dark"] .sw-line{background:rgba(255,255,255,0.12);}
html[data-theme="dark"] #emo-body2 [style*="#fff8e1"],
html[data-theme="dark"] #emo-body2 [style*="#e8f5e9"],
html[data-theme="dark"] #emo-body2 [style*="#f8fdf8"],
html[data-theme="dark"] #emo-body2 [style*="rgba(255,255,255,0.7)"]{background:rgba(255,255,255,0.06)!important;color:var(--text)!important;}
html[data-theme="dark"] .food.on{background:rgba(255,255,255,0.06)!important;}
html[data-theme="dark"] .food.pearl.on{background:rgba(255,255,255,0.06)!important;}
html[data-theme="dark"] .food.pearl.on .mk,html[data-theme="dark"] .food.pearl .fchip.on{background:radial-gradient(circle at 35% 30%,#cfc9ba,#9c968a)!important;color:#16201a!important;border-color:#cfc9ba!important;}

.emo-header2 {
  display:flex; align-items:center; padding:14px 16px 10px;
  border-bottom:1px solid rgba(0,0,0,0.07); flex-shrink:0; position:relative;
}
.emo-drag { position:absolute; top:7px; left:50%; transform:translateX(-50%);
  width:36px; height:4px; border-radius:4px; background:rgba(0,0,0,0.13); }
.emo-close2 {
  width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.07);
  border:none; cursor:pointer; font-size:18px; display:flex; align-items:center;
  justify-content:center; flex-shrink:0; -webkit-tap-highlight-color:transparent;
}
.emo-htitle { flex:1; text-align:center; font-size:18px; font-weight:900; }

/* tabs */
.emo-tabs2 { display:flex; padding:8px 14px 0; gap:8px; flex-shrink:0; }
.emo-tab2 {
  flex:1; padding:8px 4px; border:none; border-radius:12px;
  font-size:14px; font-weight:700; cursor:pointer; background:rgba(0,0,0,0.05);
  color:#78909c; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.emo-tab2.on { color:#fff; }

/* body */
.emo-body2 { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 14px 110px; display:block; font-size:15px; }

/* card */
.emo-card2 {
  background:#fff; border-radius:16px; padding:14px;
  margin-bottom:12px; border:1px solid rgba(0,0,0,0.07);

  width:100%; box-sizing:border-box;
}
.emo-sec { font-size:18px; font-weight:900; margin-bottom:10px; }

/* emotion wheel */
.ew-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px; }
.ew-btn2 {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:8px 3px; border-radius:12px; border:2px solid transparent;
  cursor:pointer; background:rgba(0,0,0,0.03); gap:3px; transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;
}
.ew-btn2.sel { border-color:currentColor; transform:scale(1.06); }
.ew-em { font-size:30px; line-height:1.1; margin-bottom:2px; }
.ew-lb { font-size:15px; font-weight:800; }

/* root grid */
.root-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.root-btn2 {
  padding:8px 10px; border-radius:10px; border:1.5px solid rgba(0,0,0,0.08);
  background:#fff; cursor:pointer; font-size:13px; font-weight:700;
  text-align:left; display:flex; align-items:center; gap:8px; transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;
}
.root-btn2.sel { border-color:#7B1FA2; background:rgba(123,31,162,0.09); color:#7B1FA2; }

/* step wizard */
.step-wizard { display:flex; flex-direction:column; gap:0; }
.sw-step {
  display:flex; gap:0; position:relative;
}
.sw-left { display:flex; flex-direction:column; align-items:center; width:36px; flex-shrink:0; }
.sw-num {
  width:30px; height:30px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:14px; font-weight:900; color:#fff; flex-shrink:0; z-index:1;
  transition:all 0.3s;
}
.sw-line { width:2px; flex:1; min-height:16px; background:rgba(0,0,0,0.08); margin:2px 0; }
.sw-body {
  flex:1; padding:10px 0 16px 10px;
}
.sw-title { font-size:18px; font-weight:900; margin-bottom:4px; }
.sw-desc { font-size:16px; color:#546e7a; line-height:1.7; }
.sw-action-area { margin-top:8px; }

/* breath */
#breath-circle2 {
  width:110px; height:110px; border-radius:50%; margin:0 auto 10px;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  font-size:15px; font-weight:900; color:#fff; cursor:pointer;
  background:radial-gradient(circle,#F26430,#A01E28);
  box-shadow:0 0 0 0 rgba(76,175,80,0.3);
  transition:transform 3s ease-in-out, background 0.6s; position:relative;
}
#breath-circle2.inhale2 { transform:scale(1.4); background:radial-gradient(circle,#4FC3F7,#0277BD); }
#breath-circle2.hold2   { transform:scale(1.4); background:radial-gradient(circle,#FFB74D,#E65100); }
#breath-circle2.exhale2 { transform:scale(1); background:radial-gradient(circle,#F5A070,#D42E3C); transition:transform 6s ease-in-out, background 0.6s; }

/* scale */
.stress-scale2 { display:flex; gap:5px; justify-content:center; margin:10px 0; }
.ss-scl {
  flex:1; max-width:56px; height:52px; border-radius:12px; border:2px solid transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:22px; background:rgba(0,0,0,0.04); transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.ss-scl.on { transform:scale(1.15); border-color:currentColor; }

/* source grid */
.ss-grid2 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.ss-btn2 {
  padding:9px 5px; border-radius:12px; border:1.5px solid rgba(0,0,0,0.07);
  background:#fff; cursor:pointer; text-align:center; transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;
}
.ss-btn2.sel { border-color:#EF5350; background:rgba(239,83,80,0.08); }
.ss-btn2 .si { font-size:22px; margin-bottom:3px; }
.ss-btn2 .sl { font-size:15px; font-weight:700; color:#546e7a; }
.ss-btn2.sel .sl { color:#EF5350; }

/* relief grid */
.relief-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.relief-card2 {
  padding:12px 8px; border-radius:12px; border:1.5px solid rgba(0,0,0,0.07);
  cursor:pointer; text-align:center; transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.relief-card2:active { transform:scale(0.94); }
.relief-card2.active { border-width:2px; box-shadow:0 3px 12px rgba(0,0,0,0.12); }

/* mini trend */
.trend-bars { display:flex; gap:3px; align-items:flex-end; height:48px; margin-bottom:4px; }
.t-bar { flex:1; border-radius:4px 3px 1px 1px; min-height:3px; transition:height 0.4s; }

@keyframes stepIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.step-in { animation:stepIn 0.3s ease forwards; }
/* measure */
.mbig{font-size:2.2rem;font-weight:900;color:var(--brand-d);line-height:1.1;}
.mbig small{font-size:1rem;font-weight:700;color:var(--muted);}
.msub{font-size:.9rem;font-weight:700;color:var(--text2);margin-top:2px;}
.mrow{display:flex;gap:.5rem;align-items:center;margin-top:.6rem;}
.minput{flex:1;min-width:0;border:2px solid var(--border);background:var(--surface);color:var(--text);border-radius:12px;padding:.6rem .7rem;font-size:1rem;font-weight:700;text-align:center;}
.minput::placeholder{color:var(--muted);font-weight:500;}
.msep{font-size:1.2rem;font-weight:800;color:var(--muted);}
.mbtn{flex:0 0 auto;border:none;background:var(--brand);color:#fff;border-radius:12px;padding:.6rem 1.1rem;font-size:.95rem;font-weight:800;cursor:pointer;}
.bpcat{display:inline-block;border-radius:999px;padding:.12rem .55rem;font-size:.78rem;font-weight:800;margin-left:4px;}
.mlt{font-size:.85rem;font-weight:800;color:var(--brand-d);margin-bottom:.3rem;}

.mrec b{flex:1;font-size:1rem;}
.mdel{border:none;background:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:2px 6px;}
.bpdot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
/* fasting */
.fgoals{display:flex;gap:.45rem;margin-top:.4rem;}
.fgoal{flex:1;border:2px solid var(--border);background:var(--surface);border-radius:12px;padding:.55rem .2rem;cursor:pointer;text-align:center;transition:.2s;}
.fgoal .gl{font-size:1.15rem;font-weight:800;}
.fgoal .gd{font-size:.8rem;color:var(--text2);}
.fgoal .gx{font-size:.8rem;font-weight:700;margin-top:1px;}
.fboxes{display:flex;gap:.5rem;margin-top:.6rem;}
.fbox{flex:1;border:1.5px solid;border-radius:12px;padding:.5rem .2rem;text-align:center;}
.fbox .fbk{font-size:.78rem;color:var(--text2);}
.fbox .fbv{font-size:1.1rem;font-weight:800;margin-top:2px;}
.ftoggle{display:flex;align-items:center;justify-content:space-between;font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.2rem;}
.ftbtn{border:none;border-radius:10px;padding:.28rem .75rem;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--track);color:var(--muted);}

.fhidden{display:none;}
.sci{display:flex;gap:.5rem;align-items:flex-start;margin-top:.5rem;}
.sci-i{font-size:1.25rem;flex:0 0 auto;}
.sci-t{font-weight:800;color:var(--brand-d);font-size:.95rem;}
.sci-d{font-size:.86rem;color:var(--text2);line-height:1.6;margin-top:1px;}
.fbars{display:flex;gap:4px;margin:.4rem 0 .2rem;}
.fbar{flex:1;height:28px;border-radius:4px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;}
/* stats */
.sbars{display:flex;align-items:flex-end;gap:.4rem;height:150px;margin-top:.7rem;}
.sbar{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:3px;}
.sbar-v{font-size:.72rem;color:var(--muted);font-weight:700;}

.stat{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:.8rem;text-align:center;}
.stat-ic{font-size:1.6rem;}
.stat-v{font-size:1.6rem;font-weight:900;color:var(--brand-d);line-height:1.1;margin-top:2px;}
.stat-l{font-size:.85rem;font-weight:700;color:var(--text2);}
.stat-s{font-size:.75rem;color:var(--muted);margin-top:1px;}

.header{position:sticky;top:0;z-index:25;background:var(--bg);}
.topnav{display:flex;flex-direction:column;gap:.4rem;padding:0 0 8px;border-bottom:1px solid var(--border);}
.tnrow{display:flex;align-items:stretch;gap:.35rem;}
.tnlabel{flex:0 0 56px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;font-size:.68rem;font-weight:800;line-height:1.15;gap:1px;padding:2px;}
.tnlabel .ti{font-size:1.05rem;}
.tnlabel.body{background:rgba(67,160,71,.13);color:#2e7d32;}
.tnlabel.soul{background:rgba(245,158,11,.16);color:#b26a00;}
.tnrow button{flex:1;min-width:0;border:1.5px solid var(--border);background:var(--surface);border-radius:12px;padding:.4rem 1px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--text3);}
.tnrow button .ni{font-size:1.2rem;line-height:1.1;}
.tnrow button .nl{font-size:.68rem;font-weight:700;}
.tnrow button.on{border-color:var(--brand);color:var(--brand);background:rgba(67,160,71,.1);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.5rem;}
.cal-h{text-align:center;font-size:.72rem;font-weight:800;color:var(--muted);padding:2px 0;}
.cal-d{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;cursor:pointer;border:1px solid var(--border);transition:transform .12s,box-shadow .2s;padding:2px;}
.cal-d:active{transform:scale(.92);}
.cal-d.empty{background:transparent;border:none;cursor:default;}
.cal-d.today{border:2px solid #2196f3;}
.cal-d.sel{border:2.5px solid var(--brand);box-shadow:0 3px 10px rgba(67,160,71,.4);}
.cal-d .cp{font-size:.58rem;font-weight:700;}
.cal-d .cdot{width:4px;height:4px;border-radius:50%;margin-top:2px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin:.1rem 0 .6rem;}
.cal-nav .mlabel{font-size:1.2rem;font-weight:900;color:var(--brand-d);}
.cal-nav button{width:38px;height:36px;border-radius:10px;background:var(--surface2);border:none;cursor:pointer;font-size:1.35rem;font-weight:900;color:var(--brand);display:flex;align-items:center;justify-content:center;}
.cal-nav .today-btn{width:auto;padding:0 12px;font-size:.8rem;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--brand-l),var(--brand-d));box-shadow:0 2px 8px rgba(67,160,71,.4);}
.cal-legend{display:flex;flex-wrap:wrap;gap:.45rem .8rem;justify-content:center;margin-top:.75rem;}
.cal-legend .lg{display:flex;align-items:center;gap:.3rem;font-size:.74rem;color:var(--muted);}
.cal-legend .sw{width:13px;height:13px;border-radius:4px;flex:0 0 auto;}
.cal-detail .dt-h{font-weight:800;color:var(--brand-d);font-size:1rem;margin-bottom:.5rem;}
.cal-pill{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;font-size:.9rem;border-bottom:1px solid var(--border);}
.cal-pill:last-child{border-bottom:none;}
.cal-pill .pi{width:24px;text-align:center;font-size:1.15rem;}
.cal-pill .pn{flex:1;}
.cal-pill .pv{font-weight:700;color:var(--text2);}
.cal-pill.done .pv{color:var(--brand-d);}
/* bottom soul bar */
.botbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:25;background:var(--bg);border-top:1px solid var(--border);padding:6px 14px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06);}
.bothead{display:flex;align-items:center;gap:8px;padding:6px 2px 2px;}
.bothead .brand{font-size:1.08rem;font-weight:800;color:var(--brand-d);white-space:nowrap;}
.bothead .sec{font-size:.72rem;font-weight:800;letter-spacing:2px;color:#b26a00;opacity:.9;}
/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:30;
  background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;
  padding:5px 4px calc(5px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06);}
.navseg{display:flex;gap:.4rem;justify-content:center;padding:1px 0 5px;}
.navseg button{border:none;border-radius:999px;padding:.22rem .9rem;font-size:.8rem;font-weight:800;cursor:pointer;background:var(--track);color:var(--muted);}
.navseg button.on{background:var(--brand);color:#fff;}
.navrow{display:flex;}
.navrow.hidden{display:none;}
.navrow button{flex:1;border:none;background:none;padding:4px 2px;cursor:pointer;display:flex;
  flex-direction:column;align-items:center;gap:2px;color:var(--text3);}
.navrow button .ni{font-size:1.4rem;}
.navrow button .nl{font-size:.72rem;font-weight:700;}
.navrow button.on{color:var(--brand);}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--brand-d);color:#fff;
  padding:.6rem 1rem;border-radius:999px;font-size:.88rem;font-weight:700;z-index:50;opacity:0;transition:.25s;pointer-events:none;}
.toast.show{opacity:1;}
.hidden{display:none!important;}
.foot{text-align:center;color:var(--muted);font-size:.76rem;margin-top:1rem;}

function _cellPct(){
 var d=today();
 var cc=Math.min(d['cc']||0,2); // 最多計2次
 var pcc=Math.min(cc*50,100);
 var others=['e','g','s','r','n','w','b'];
 var extras=0;
 others.forEach(function(k){
   var p=null; PILLARS.forEach(function(x){if(x.k===k)p=x;});
   if(!p)return;
   var v=d[k]||0;
   if(p.type==='toggle'){if(v)extras+=10;}
   else{if(v>=goalOf(p))extras+=10;}
 });
 return Math.min(100, pcc + extras);
}

function _inkDue(it){ if(it.timing!=='custom'||!it.time)return false; if(_inkLog()[it.id])return false; return _inkNowHM()>=it.time; }

window._inkFormToggle=function(){ var f=document.getElementById('ink-form'); if(!f)return; var show=(f.style.display==='none'||!f.style.display); f.style.display=show?'block':'none'; if(show){var n=document.getElementById('ink-name'); if(n)try{n.focus();}catch(e){}} };
window._inkTimingChange=function(){ var s=document.getElementById('ink-timing'),t=document.getElementById('ink-time'); if(s&&t)t.style.display=(s.value==='custom')?'inline-block':'none'; };
window._inkAdd=function(){
  var n=document.getElementById('ink-name'),ty=document.getElementById('ink-type'),tm=document.getElementById('ink-timing'),ti=document.getElementById('ink-time'),no=document.getElementById('ink-note');
  var name=n?(n.value||'').trim():''; if(!name){ if(n)try{n.focus();}catch(e){} toast('請先輸入名稱'); return; }
  var timing=tm?tm.value:'before';
  _inkItems().push({id:'ink'+Date.now().toString(36)+Math.floor(Math.random()*1e4),name:name,type:ty?ty.value:'food',timing:timing,time:(timing==='custom'&&ti)?ti.value:'',note:no?(no.value||'').trim():'',created:Date.now()});
  save(); toast('✓ 已加入「'+name+'」'); renderFood();
};
window._inkToggle=function(id){ var log=_inkLog(); if(log[id])delete log[id]; else log[id]=Date.now(); save(); renderFood(); };
window._inkDelete=function(id){ var arr=_inkItems(),it=null,i; for(i=0;i<arr.length;i++){if(arr[i].id===id){it=arr[i];break;}} if(!it)return; _confirmDialog('🗑️ 刪除項目','確定刪除「'+it.name+'」？此項目將被移除。',function(){ S.intakeItems=_inkItems().filter(function(x){return x.id!==id;}); save(); renderFood(); }); };

function bpCat(sys,dia){
  if(sys>=180||dia>=120) return {l:'高血壓危象',c:'#b71c1c'};
  if(sys>=140||dia>=90)  return {l:'第二期高血壓',c:'#e53935'};
  if(sys>=130||dia>=80)  return {l:'第一期高血壓',c:'#fb8c00'};
  if(sys>=120&&dia<80)   return {l:'血壓升高',c:'#f9a825'};
  return {l:'正常',c:'#43a047'};
}
function mdate(t){var d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate();}
function spark(vals,color){
  if(!vals||vals.length<2)return '';
  var w=320,h=72,pad=10,n=vals.length;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals); if(mx===mn)mx=mn+1;
  var xy=vals.map(function(v,i){var x=pad+(w-2*pad)*(n>1?i/(n-1):0);var y=pad+(h-2*pad)*(1-(v-mn)/(mx-mn));return [x,y];});
  var pts=xy.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var dots=xy.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.6" fill="'+color+'"/>';}).join('');

}

var fastTick=null;
function pad2(n){return ('0'+Math.floor(n)).slice(-2);}

var FAST_GOALS=[{w:13,label:'13小時',desc:'入門款',color:'#66BB6A'},{w:14,label:'14小時',desc:'穩定款',color:'#42A5F5'},{w:15,label:'15小時',desc:'進階款',color:'#FFB74D'},{w:16,label:'16小時',desc:'強效款 ★',color:'#F26430'}];
var FAST_SCI=[['⚡','細胞自噬啟動','空腹13–16小時後，細胞自噬（Autophagy）啟動，清除受損蛋白質與老廢物，細胞重獲新生'],['🔥','燃脂切換模式','糖原耗盡後身體切換燃脂模式，幫助細胞控重並提升代謝效率'],['📉','調節胰島素','空腹期間胰島素大幅下降，打破胰島素阻抗惡性循環，細胞敏感度恢復'],['🧠','心智清醒','酮體是大腦的優質燃料，空腹後思維更清晰、專注力提升'],['🌿','細胞控重原理','「吃對時間」讓身體有完整的消化→整理→修復三個階段，是細胞控重最自然的方式']];
function renderFasting(){
  if(fastTick){clearInterval(fastTick);fastTick=null;}
  var view=document.getElementById('view'); view.innerHTML='';
  document.getElementById('secLabel').textContent='⏱ 空腹計時 FASTING';
  if(!S.fast)S.fast={cur:null,log:[],goal:16};
  var f=S.fast; var active=!!f.cur; var W=f.goal;
  function fbox(c,k,v){return '<div class="fbox" style="border-color:'+c+'59;background:'+c+'1f"><div class="fbk">'+k+'</div><div class="fbv" style="color:'+c+'">'+v+'</div></div>';}

  /* 計畫選擇 */
  var gc=el('div','card'); gc.innerHTML='<div class="mlt" style="color:var(--brand-d)">⏱ 選擇空腹計畫</div><div class="fgoals"></div>';
  var gw=gc.querySelector('.fgoals');
  FAST_GOALS.forEach(function(o){
    var on=f.goal===o.w; var bt=el('button','fgoal');
    if(on){bt.style.borderColor=o.color;bt.style.background=o.color+'24';bt.style.boxShadow='0 4px 14px '+o.color+'4d';}
    if(active){bt.disabled=true; if(!on)bt.style.opacity='.35';}
    bt.innerHTML='<div class="gl" style="color:'+o.color+'">'+o.label+'</div><div class="gd">空腹 '+o.w+'h</div><div class="gd">快樂吃 '+(24-o.w)+'h</div><div class="gx" style="color:'+o.color+'">'+o.desc+'</div>';
    if(!active) bt.addEventListener('click',function(){S.fast.goal=o.w;save();renderFasting();});
    gw.appendChild(bt);
  });
  view.appendChild(gc);

  /* 計時環 */
  var ring=el('div','card'); ring.style.textAlign='center'; view.appendChild(ring);
  function paintRing(){
    var R=88,C=2*Math.PI*R,inner,boxes='';
    if(active){
      var elp=Date.now()-f.cur.start, goalMs=f.cur.goalH*3600000;
      var pct=Math.min(100,elp/goalMs*100), reached=elp>=goalMs, pc=reached?'#81C784':'#FFB74D';
      var eatArc='<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="rgba(129,199,132,0.15)" stroke-width="14" stroke-dasharray="'+(C*((24-f.cur.goalH)/24))+' '+C+'" stroke-dashoffset="'+(-C*(f.cur.goalH/24))+'"/>';
      inner='<div class="ring-wrap" style="width:200px;height:200px"><svg width="200" height="200">'
        +'<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="var(--track)" stroke-width="14"/>'+eatArc
        +'<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="'+pc+'" stroke-width="14" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+(C*(1-pct/100))+'" style="transition:stroke-dashoffset 1s,stroke .5s"/></svg>'
        +'<div class="mid"><div style="font-size:14px;color:var(--text2)">'+(reached?'⚡ 空腹達標！':'⏳ 空腹進行中')+'</div>'

        +'<div style="font-size:15px;color:var(--muted)">/ '+f.cur.goalH+'h 目標</div>'
        +'<div style="font-size:18px;font-weight:800;color:'+pc+'">'+pct.toFixed(1)+'%</div></div></div>';
      var st=new Date(f.cur.start), eat=new Date(f.cur.start+goalMs), stop=new Date(eat.getTime()+(24-f.cur.goalH)*3600000);
      boxes='<div class="fboxes">'+fbox('#FFB74D','⏹ 空腹開始',pad2(st.getHours())+':'+pad2(st.getMinutes()))
        +fbox('#81C784','🥗 開始進食',pad2(eat.getHours())+':'+pad2(eat.getMinutes()))

    }else{
      inner='<div class="ring-wrap" style="width:200px;height:200px"><svg width="200" height="200">'
        +'<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="var(--track)" stroke-width="14"/></svg>'
        +'<div class="mid"><div style="font-size:42px">\u23F0</div><div style="font-size:16px;color:var(--text2)">準備斷食</div>'
        +'<div style="font-size:20px;font-weight:800;color:var(--brand-d)">'+W+':'+(24-W)+'</div></div></div>';
    }
    ring.innerHTML=inner+boxes;
  }
  paintRing();

  /* 自訂時間 + 開始/結束 */
  var ctl=el('div','card'); view.appendChild(ctl);
  var endBtn,startBtn,miOn=false,wiOn=false;
  if(active){
    ctl.innerHTML='<div class="ftoggle"><span>\u23F0 自訂結束時間</span><button class="ftbtn" id="f-mi">設定</button></div>'
      +'<div id="f-mibox" class="fhidden"><div class="lead" style="margin:.3rem 0">若已在某時間結束，可回填實際結束時間。</div>'
      +'<input class="minput" type="time" id="f-ri" style="text-align:center"/><div id="f-ripreview" class="lead" style="margin:.3rem 0"></div></div>';
    endBtn=el('button','mbtn'); endBtn.style.cssText='width:100%;padding:.85rem;margin-top:.5rem;font-size:1.1rem;border-radius:12px';

    endBtn.style.background=rn0?'linear-gradient(135deg,#81C784,#388E3C)':'#546e7a';

    ctl.appendChild(endBtn);
    ctl.querySelector('#f-mi').addEventListener('click',function(){
      miOn=!miOn; this.textContent=miOn?'\u2713 開啟':'設定'; this.classList.toggle('on',miOn);
      document.getElementById('f-mibox').classList.toggle('fhidden',!miOn);
      var rn=(Date.now()-f.cur.start)>=f.cur.goalH*3600000;
      endBtn.textContent=miOn?'\u23F9 回填時間結束':(rn?'\u2705 完成斷食！':'\u23F9 結束斷食');
    });
    ctl.querySelector('#f-ri').addEventListener('input',function(){
      var v=this.value, pv=document.getElementById('f-ripreview');
      if(!v){pv.textContent='';return;}
      var p=v.split(':'), d=new Date(); d.setHours(+p[0],+p[1],0,0);
      var hrs=Math.max(0,(d-f.cur.start)/3600000);
      pv.textContent='結束時間：'+v+' \u2192 斷食 '+hrs.toFixed(1)+'h '+(hrs>=f.cur.goalH?'\u2705 達標':'（未達'+f.cur.goalH+'h）');
    });
    endBtn.addEventListener('click',function(){
      var end=Date.now();
      if(miOn){var v=document.getElementById('f-ri').value; if(v){var p=v.split(':'),d=new Date();d.setHours(+p[0],+p[1],0,0); end=d.getTime();}}
      var hours=Math.max(0,(end-f.cur.start)/3600000), done=hours>=f.cur.goalH;

/* ===== 斷食提醒：音效 / 通知 / 震動 / 自動循環 ===== */
var _fac=null;
function fastUnlockAudio(){ try{ if(!_fac){var AC=window.AudioContext||window.webkitAudioContext; if(AC)_fac=new AC();} if(_fac&&_fac.state==='suspended')_fac.resume(); }catch(e){} }
function fastRequestNotify(){ try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){} }
function fastChime(kind){
  if(S.fast&&S.fast.sound===false) return;
  try{ fastUnlockAudio(); if(!_fac) return; var t0=_fac.currentTime, seq;
    if(kind==='cycle'){ seq=[[523.25,0],[659.25,.16],[783.99,.32],[1046.50,.50]]; }
    else { seq=[[784,0],[988,.16],[784,.50],[988,.66],[784,1.00],[988,1.16]]; }
    seq.forEach(function(n){ var o=_fac.createOscillator(),g=_fac.createGain(); o.type='sine'; o.frequency.value=n[0];
      var s=t0+n[1]; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.35,s+.02); g.gain.exponentialRampToValueAtTime(.0001,s+.42);
      o.connect(g); g.connect(_fac.destination); o.start(s); o.stop(s+.46); });
  }catch(e){}
}
function fastNotify(title,body){ try{ if('Notification' in window && Notification.permission==='granted'){ var n=new Notification(title,{body:body,tag:'fast321',renotify:true}); setTimeout(function(){try{n.close();}catch(e){}},9000);} }catch(e){} }
function fastAlert(kind,goalH){
  var title,short,color;
  if(kind==='goal'){ title='\uD83C\uDF89 斷食達標！'; short='已滿 '+goalH+'h，可以開始進食了'; color='#FF8F00'; }
  else if(kind==='cycle'){ title='\uD83D\uDD14 新一輪斷食開始'; short='上一輪已完成記錄，已自動換輪'; color='#388E3C'; }
  else { title='\u23F8\uFE0F 自動循環已暫停'; short='上一輪已記錄，請手動開始新一輪'; color='#546e7a'; }
  fastChime(kind==='goal'?'goal':'cycle');
  if(navigator.vibrate){ try{ navigator.vibrate(kind==='goal'?[300,150,300,150,300]:[200,100,200]); }catch(e){} }
  fastNotify(title, kind==='goal'?('已完成 '+goalH+' 小時斷食，可以開始進食了。願神的供應夠你用！'):kind==='cycle'?'上一輪斷食已完成並記錄，已自動開始新一輪。倚靠主，繼續得勝！':'上一輪斷食已記錄。因間隔較久，已暫停自動循環，請手動開始新一輪。');
  toast(title+'｜'+short, color);
}
function fastWatch(){
  var f=S.fast; if(!f||!f.cur) return;
  var now=Date.now(), goalMs=f.cur.goalH*3600000, cycleMs=86400000, elapsed=now-f.cur.start;
  if(elapsed>=goalMs && !f.cur.nGoal){ f.cur.nGoal=true; save(); fastAlert('goal', f.cur.goalH); }
  if(elapsed>=cycleMs){
    f.log.push({start:f.cur.start,end:f.cur.start+goalMs,goalH:f.cur.goalH,hours:f.cur.goalH,done:true});
    if(elapsed>=2*cycleMs){ f.cur=null; save(); fastAlert('stop'); }
    else { f.cur={start:f.cur.start+cycleMs,goalH:f.goal,nGoal:false,nCycle:false}; save(); fastAlert('cycle', f.goal); }
    if(window.__tab==='fast' && typeof renderFasting==='function') renderFasting();
  }
}

function _confirmDialog(title,msg,onOk){

  ov.innerHTML='<div style="background:var(--surface);border-radius:16px;padding:22px 20px;max-width:340px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.4)">'

    +'<div style="display:flex;gap:10px"><button id="cf-no" style="flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-weight:700;cursor:pointer">取消</button>'

function _showShareText(title,text){

function _genYearReport(){
  var y=new Date().getFullYear(); var name=(S.profile&&S.profile.name)||'健康使者';
  var perfect=0, exMin=0, waterDays=0; var wp=null; PILLARS.forEach(function(p){if(p.k==='w')wp=p;});
  Object.keys(S.days||{}).forEach(function(k){ var o=S.days[k]; if(!o)return; if(dayPct(o)>=100)perfect++; exMin+=(o.e||0); if(wp&&(o.w||0)>=goalOf(wp))waterDays++; });
  var rainbowDays=0; Object.keys(S.rainbow||{}).forEach(function(k){ if((S.rainbow[k]||[]).length>=5)rainbowDays++; });
  var devoN=Object.keys((S.devo&&S.devo.done)||{}).filter(function(x){return S.devo.done[x];}).length;
  var prayN=Object.keys(S.bedPray||{}).filter(function(x){return S.bedPray[x];}).length;
  var thanksN=0; Object.keys(S.bedThanks||{}).forEach(function(k){thanksN+=(S.bedThanks[k]||[]).length;});
  var fdone=((S.fast&&S.fast.log)||[]).filter(function(o){return o.done;}).length;
  var mN=((S.measure&&S.measure.w)||[]).length+((S.measure&&S.measure.bp)||[]).length;
  return '📊 '+y+'年度感恩報告\n👤 '+name+'\n\n⚡ 充電成就\n• 全達成天數：'+perfect+' 天\n• 累計運動：'+Math.round(exMin/60)+' 小時\n• 飲水達標：'+waterDays+' 天\n• 七彩飲食達標：'+rainbowDays+' 天\n\n✨ 心靈成長\n• 心靈SPA：'+devoN+' 次\n• 感恩記錄：'+prayN+' 則\n• 感恩記錄：'+thanksN+' 則\n\n📈 累計成果\n• 最長連續充電：'+_streakDays()+' 天\n• 空腹達標：'+fdone+' 次\n• 量測紀錄：'+mN+' 筆\n\n────────────────\n「我深信那在你們心裡動了善工的，必成全這工，直到耶穌基督的日子。」\n— 腓立比書 1:6\n\n🌿 CELL CHARGE 愛菲亞細胞快充站\nAIFYA 愛菲亞\n活出基督，成為得勝者 🙏';
}

function renderStrTrend(){
  if(S.strLog.length<2)return '';

  html += '<div class="trend-bars">';
  days.forEach(function(d){
    var recs=S.strLog.filter(function(r){return r.date===d.k;});
    var lv=recs.length>0?recs[recs.length-1].level:0;
    var h=lv>0?lv/5*80+16:12;
    html += '<div class="t-bar" style="height:'+h+'%;background:'+colors[lv]+';"></div>';
  });

  return html;

function buildDays14(){
  var days=[];
  for(var i=13;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    days.push({k:k,recs:S.emoLog.filter(function(r){return r.date===k;})});
  }
  return days;
}

window._txStart= function(){ S.txStep=1; render(); };

window._txDone=function(){
  S.txStep=6; S.txDone=['s1','s2','s3','s4','s5'];
  if(S.emo){
    var eo=findEmo(S.emo);
    var rootObj=ROOTS.find(function(r){return r.k===S.root;});

/* 深呼吸 */
function runBreathCycle(){
  S.breathPhase='inhale'; updateBreath();
  S.breathTimer=setTimeout(function(){
    S.breathPhase='hold'; updateBreath();
    S.breathTimer=setTimeout(function(){
      S.breathPhase='exhale'; updateBreath();
      S.breathTimer=setTimeout(function(){
        S.breathCount++;
        if(S.breathCount < 5){
          runBreathCycle(); // auto-continue next cycle
        } else {
          // Done 5 cycles
          S.breathPhase='idle'; S.breathCount=0;
          updateBreath();
          S.breathTimer=null;
          toast('🌬️ 5次深呼吸完成！願神的平安充滿你的心。','#4CAF50');
        }
      },8000);
    },7000);
  },4000);
}
window._sb=function(){
  // Click to start (idle) or stop (during any phase)
  if(S.breathTimer){
    clearTimeout(S.breathTimer); S.breathTimer=null;
    S.breathPhase='idle'; S.breathCount=0;
    updateBreath(); return;
  }
  if(S.breathPhase==='idle'){
    runBreathCycle();
  }
};
function updateBreath(){
  var c=document.getElementById('breath-circle2');
  if(!c){render();return;}
  var labels={idle:'點擊開始',inhale:'吸氣',hold:'憋住',exhale:'呼氣'};

  c.className=S.breathPhase+'2';
  c.innerHTML='<div style="font-size:15px;font-weight:900;">'+labels[S.breathPhase]+'</div><div style="font-size:15px;opacity:0.85;">'+secs[S.breathPhase]+'</div>';
  var n=c.nextElementSibling;
  if(n)n.textContent=S.breathPhase==='idle'?'點擊開始 · 自動完成5次':'第 '+(S.breathCount+1)+' / 5 次';
}

/* ── Hook 情緒按鈕 ── */
function hookBtn(){
  var nav=document.getElementById('ns-bottom-nav');
  if(!nav){setTimeout(hookBtn,900);return;}
  nav.querySelectorAll('.bn-tab[data-tab="today_mood"]').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();openEmo('emotion');},true);
  });
}
/* ── 步驟按鈕：document 層級委派(對動態重建內容最可靠，取代不穩的內聯 onclick) ── */
document.addEventListener('click', function(e){
  var t = e.target;
  if (!t) return;
  if (t.nodeType === 3) t = t.parentElement;
  if (!t || !t.closest) return;
  t = t.closest('[data-txnext],[data-txstart],[data-txdone],[data-fruit]');
  if (!t) return;
  if (t.hasAttribute('data-txstart')) { window._txStart && window._txStart(); }
  else if (t.hasAttribute('data-txdone')) { window._txDone && window._txDone(); }
  else if (t.hasAttribute('data-fruit')) { window._pickFruit && window._pickFruit(t.getAttribute('data-fruit')); }
  else if (t.hasAttribute('data-txnext')) { window._txNext && window._txNext(t.getAttribute('data-txnext')); }
}, false);

/* hookBtn 自動掛載已移除：v17 由情緒分頁直接呼叫 _openEmotionModule */

          var _favq=(mi>0&&chat.msgs[mi-1]&&chat.msgs[mi-1].role==="user")?chat.msgs[mi-1].text:"";
          var _isfav=xzIsFav(_favq,m.text);
          var _col=!!m.collapsed;
          var _body=_col?('<div class="xz-collapsed-preview">'+esc(String(m.text||"").replace(/\s+/g," ").slice(0,28))+'\u2026</div>'):xzFmt(m.text);
          msgsHtml+='<div class="xz-msg xz-ai"><div class="xz-bubble">'+_body
            +'<div class="xz-acts">'
            +'<button class="xz-act" id="xzspk-'+mi+'" onclick="xzSpeak('+mi+')">'+((window.xzTTS&&window.xzTTS.active&&window.xzTTS.curId===("msg"+mi))?'⏹ 停止':'🔊 朗讀')+'</button>'
            +'<button class="xz-act" onclick="xzToggleCollapse('+mi+')">'+(_col?'\u25b8 \u5c55\u958b':'\u25be \u6536\u5408')+'</button>'
            +'<button class="xz-act'+(_isfav?' on':'')+'" onclick="xzFav('+mi+')">'+(_isfav?'\u2605 \u5df2\u6536\u85cf':'\u2606 \u6536\u85cf')+'</button>'
            +'<button class="xz-act" onclick="xzDelMsg('+mi+')">\ud83d\uddd1 \u522a\u9664</button>'
            +'</div></div></div>';
        }
      });
      if(chat.busy) msgsHtml+='<div class="xz-msg xz-ai"><div class="xz-bubble xz-typing"><span></span><span></span><span></span></div></div>';
      var pick=function(label){
        var h='<div class="xz-cat-label">'+esc(label)+'</div>';
        h+='<div class="xz-cats">'+XZ_TOPICS.map(function(t,ci){return '<button class="xz-cat'+(chat.topic===ci?' active':'')+'" onclick="xzTopic('+ci+')">'+esc(t.c)+'</button>';}).join("")+'</div>';
        if(chat.topic>=0&&XZ_TOPICS[chat.topic]){
          h+='<div class="xz-quicks xz-topic-qs">'+XZ_TOPICS[chat.topic].qs.map(function(q,qi){return '<button class="xz-quick" onclick="xzTopicAsk('+chat.topic+','+qi+')">'+esc(q)+'</button>';}).join("")+'</div>';
        }
        return h;
      };
      if(chat.msgs.length===0){
        msgsHtml+='<div class="xz-quicks">'+xzStarters().map(function(q,i){return '<button class="xz-quick" onclick="xzQuick('+i+')">'+esc(q)+'</button>';}).join("")+'</div>';
        msgsHtml+=pick("\u9078\u4e00\u500b\u5065\u5eb7\u7bc4\u7587 \u00b7 \u9ede\u7bc4\u7587\u770b 20 \u500b\u63d0\u554f");
      }else if(!chat.busy){
        msgsHtml+='<div class="xz-home-sep">\u00b7 \u524d\u9762\u7684\u554f\u7b54\u5df2\u4fdd\u7559 \u00b7</div>';
        msgsHtml+=pick("\u63db\u500b\u7bc4\u7587\uff0e\u56de\u9019\u88e1\u7e7c\u7e8c\u767c\u554f");
      }
    }
    html+='<div class="xz-overlay" onclick="if(event.target===this)xzClose()">'
      +'<div class="xz-sheet">'
        +'<div class="xz-head"><div class="xz-head-l"><span class="xz-ava">\u26a1</span><div><div class="xz-name">\u5c0f\u667a</div><div class="xz-role">AI \u5065\u5eb7\u6559\u7df4 \u00b7 \u9663\u4f60\u7d30\u80de\u5feb\u5145</div></div></div>'
        +'<div class="xz-head-r"><button class="xz-hbtn" onclick="xzToggleFavs()" aria-label="\u6536\u85cf">\u2b50</button><button class="xz-hbtn" onclick="xzClearAll()" aria-label="\u91cd\u65b0\u958b\u59cb">\ud83c\udfe0</button><button class="xz-x" onclick="xzClose()">\u2715</button></div></div>'
        +'<div class="xz-msgs" id="xz-msgs">'+msgsHtml+'</div>'
        +'<div class="xz-foot"><input id="xz-input" class="xz-input" type="text" placeholder="\u5411\u5c0f\u667a\u63d0\u554f\u2026" onkeydown="if(event.key===\'Enter\')xzSend()"><button class="xz-send" onclick="xzSend()">\u9001\u51fa</button></div>'
        +'<div class="xz-note">\u5c0f\u667a\u662f AI \u5065\u5eb7\u6559\u7df4\uff0c\u63d0\u4f9b\u4e00\u822c\u4fdd\u5065\u53c3\u8003\uff0c\u4e0d\u80fd\u53d6\u4ee3\u5c08\u696d\u91ab\u7642\u8a3a\u65b7\u8207\u6cbb\u7642\u3002\u8eab\u9ad4\u4e0d\u9069\u8acb\u8ae2\u8a62\u91ab\u5e2b \ud83d\ude4f</div>'
      +'</div></div>';
  }
  host.innerHTML=html;
  var fabEl=host.querySelector(".xz-fab");
  if(fabEl){
    if(XZ.pos){
      var w=fabEl.offsetWidth||110,h2=fabEl.offsetHeight||48;
      var cx=Math.max(6,Math.min(XZ.pos.x,window.innerWidth-w-6));
      var cy=Math.max(6,Math.min(XZ.pos.y,window.innerHeight-h2-6));
      if(cx!==XZ.pos.x||cy!==XZ.pos.y){fabEl.style.left=cx+"px";fabEl.style.top=cy+"px";XZ.pos={x:cx,y:cy};}
    }
    attachFabDrag(fabEl);
  }
}

function attachFabDrag(fab){
  if(!fab || fab.__dragWired) return; fab.__dragWired=true;
  var sx=0,sy=0,ox=0,oy=0,moved=false,dragging=false;
  fab.addEventListener("pointerdown",function(e){
    var r=fab.getBoundingClientRect();
    sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top; moved=false; dragging=true;
    fab.style.transition="none";
    try{fab.setPointerCapture(e.pointerId);}catch(_){}
  });
  fab.addEventListener("pointermove",function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved && (Math.abs(dx)>4||Math.abs(dy)>4)) moved=true;
    if(!moved) return;
    var w=fab.offsetWidth, h=fab.offsetHeight;
    var nx=Math.max(6,Math.min(ox+dx, window.innerWidth-w-6));
    var ny=Math.max(6,Math.min(oy+dy, window.innerHeight-h-6));
    fab.style.left=nx+"px"; fab.style.top=ny+"px"; fab.style.right="auto"; fab.style.bottom="auto";
  });
  function endDrag(e){
    if(!dragging) return; dragging=false; fab.style.transition="";
    try{fab.releasePointerCapture(e.pointerId);}catch(_){}
    if(moved){
      var r=fab.getBoundingClientRect();
      XZ.pos={x:Math.round(r.left), y:Math.round(r.top)}; xzPersist();
      window.__xzJustDragged=true; setTimeout(function(){window.__xzJustDragged=false;},350);
    }
  }
  fab.addEventListener("pointerup",endDrag);
  fab.addEventListener("pointercancel",endDrag);
}

window.xzOpen=function(){chat.open=true;renderChat();xzScrollBottom();setTimeout(function(){var i=document.getElementById("xz-input");if(i&&i.focus)i.focus();},60);};
window.xzClose=function(){chat.open=false;renderChat();};
window.xzToggleCollapse=function(i){ if(chat.msgs[i]){ chat.msgs[i].collapsed=!chat.msgs[i].collapsed; renderChat(); } };
window.xzDelMsg=function(i){ if(!chat.msgs[i])return; if(!window.confirm("\u522a\u9664\u9019\u5247\u5c0d\u8a71\uff1f"))return; var from=i,cnt=1; if(i>0&&chat.msgs[i-1]&&chat.msgs[i-1].role==="user"){from=i-1;cnt=2;} chat.msgs.splice(from,cnt); renderChat(); };
window.xzSend=function(){var i=document.getElementById("xz-input");if(!i)return;var t=(i.value||"").trim();if(!t||chat.busy)return;chat.favView=false;chat.msgs.push({role:"user",text:t});i.value="";renderChat();xzScrollBottom();xzCall();};
window.xzQuick=function(idx){if(chat.busy)return;var t=xzStarters()[idx];if(!t)return;chat.favView=false;chat.msgs.push({role:"user",text:t});renderChat();xzScrollBottom();xzCall();};
window.xzTopic=function(ci){chat.topic=(chat.topic===ci?-1:ci);renderChat();var m=document.getElementById("xz-msgs");if(m&&chat.topic>=0){var qs=m.querySelector(".xz-topic-qs");if(qs)qs.scrollIntoView({block:"nearest",behavior:"smooth"});}};
window.xzTopicAsk=function(ci,qi){if(chat.busy)return;var t=(XZ_TOPICS[ci]&&XZ_TOPICS[ci].qs[qi]);if(!t)return;chat.topic=-1;chat.favView=false;chat.msgs.push({role:"user",text:t});renderChat();xzScrollBottom();xzCall();};
window.xzFav=function(mi){ var m=chat.msgs[mi]; if(!m)return; var q=(mi>0&&chat.msgs[mi-1]&&chat.msgs[mi-1].role==="user")?chat.msgs[mi-1].text:""; var a=m.text||""; if(!XZ.favs)XZ.favs=[]; var sig=xzFavSig(q,a),idx=-1; for(var k=0;k<XZ.favs.length;k++){ if(xzFavSig(XZ.favs[k].q,XZ.favs[k].a)===sig){idx=k;break;} } if(idx>=0){ XZ.favs.splice(idx,1); xzToast("\u5df2\u79fb\u9664\u6536\u85cf"); } else { XZ.favs.unshift({q:q,a:a,t:Date.now()}); xzToast("\u2b50 \u5df2\u6536\u85cf"); } xzPersist(); renderChat(); };
window.xzFavRemove=function(idx){ if(!XZ.favs)return; if(!window.confirm("\u5f9e\u6536\u85cf\u79fb\u9664\u9019\u5247\u554f\u7b54\uff1f"))return; XZ.favs.splice(idx,1); xzPersist(); renderChat(); };
window.xzSpeak=function(mi){ var m=chat.msgs[mi]; if(!m||!m.text)return; if(window.xzTTS&&window.xzTTS.toggle){ window.xzTTS.toggle(m.text,"msg"+mi); } };
window.xzToggleFavs=function(){ chat.favView=!chat.favView; renderChat(); var m=document.getElementById("xz-msgs"); if(m)m.scrollTop=0; };
window.xzClearAll=function(){ if(chat.msgs.length && !window.confirm("\u8981\u6e05\u7a7a\u76ee\u524d\u6240\u6709\u554f\u7b54\u3001\u91cd\u65b0\u958b\u59cb\u55ce\uff1f\uff08\u5df2\u6536\u85cf\u7684\u4e0d\u53d7\u5f71\u97ff\uff09"))return; chat.msgs=[]; chat.topic=-1; chat.favView=false; renderChat(); };

renderChat();
})();
</script>

<script>
/* ===== 小智 · 雲哲朗讀引擎（Azure via 既有 Worker，失敗自動退回裝置內建語音） ===== */
(function(){
'use strict';
var EP="https://azure-tts.spch321.workers.dev";
var VOICE="zh-TW-YunJheNeural";
var SIL=140,SILC=140,SILE=260;
var SILENT="data:audio/wav;base64,UklGRmQGAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YUAGAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";
var tts={audio:null,unlocked:false,cache:{},active:false,curId:"",token:0,mode:""};
window.xzTTS=tts;
function getAudio(){ if(!tts.audio){ tts.audio=new Audio(); tts.audio.preload="auto"; try{tts.audio.playsInline=true;tts.audio.setAttribute("playsinline","");tts.audio.setAttribute("webkit-playsinline","");}catch(_){}} return tts.audio; }
function unlock(){ if(tts.unlocked)return; try{ var a=getAudio(); a.src=SILENT; var p=a.play(); if(p&&p.then){p.then(function(){tts.unlocked=true;}).catch(function(){});}else{tts.unlocked=true;} }catch(_){}}
function sanitize(s){ s=String(s==null?"":s); s=s.replace(/811/g,"巴妖妖"); s=s.replace(/[\uD83C-\uDBFF][\uDC00-\uDFFF]/g,"").replace(/[\u2600-\u27BF\u2190-\u21FF\u2B00-\u2BFF\uFE0F]/g,""); s=s.replace(/[*_#`>~]/g,""); return s.replace(/[ \t]+/g," ").trim(); }
function chunks(text){ var t=sanitize(text); if(!t)return[]; var enders="。！？；\n"; var out=[],buf="",i; for(i=0;i<t.length;i++){ buf+=t.charAt(i); if(enders.indexOf(t.charAt(i))>=0 && buf.length>=60){ out.push(buf); buf=""; } } if(buf.replace(/\s/g,""))out.push(buf); var fin=[]; for(i=0;i<out.length;i++){ var x=out[i]; while(x.length>280){ fin.push(x.slice(0,280)); x=x.slice(280); } if(x)fin.push(x); } return fin.length?fin:[t]; }
function fetchPiece(piece){ var key=VOICE+"|"+piece; if(tts.cache[key])return Promise.resolve(tts.cache[key]);
  return fetch(EP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({voice:VOICE,rate:"+0%",sil:SIL,silc:SILC,sile:SILE,text:piece})})
  .then(function(r){ if(!r.ok)throw new Error("TTS "+r.status); return r.blob(); })
  .then(function(b){ var url=URL.createObjectURL(b); tts.cache[key]=url; return url; }); }
function syncBtns(){ try{ var els=document.querySelectorAll('[id^="xzspk-"]'); for(var i=0;i<els.length;i++){ var id=els[i].id.replace("xzspk-",""); els[i].innerHTML=(tts.active&&tts.curId===("msg"+id))?'⏹ 停止':'🔊 朗讀'; } }catch(_){}}
function stop(){ tts.token++; tts.active=false; tts.curId=""; tts.mode=""; try{ if(tts.audio){tts.audio.pause();tts.audio.onended=null;tts.audio.onerror=null;} }catch(_){} try{ if(window.speechSynthesis)window.speechSynthesis.cancel(); }catch(_){} syncBtns(); }
function pickVoice(){ try{ var vs=(window.speechSynthesis&&window.speechSynthesis.getVoices())||[]; var byName=null,tw=null,zh=null; for(var k=0;k<vs.length;k++){ var v=vs[k],n=v.name||"",l=v.lang||""; if(/YunJhe|Yun-?Jhe|雲哲/i.test(n))byName=v; if(!tw&&/zh[-_]?TW/i.test(l))tw=v; if(!zh&&/^zh/i.test(l))zh=v; } return byName||tw||zh||null; }catch(_){return null;} }
function runNative(text,id){ if(!("speechSynthesis"in window)||typeof SpeechSynthesisUtterance==="undefined"){ stop(); return; }
  var my=++tts.token; tts.active=true; tts.curId=id; tts.mode="native"; syncBtns();
  var q=chunks(text),i=0,voice=pickVoice(); try{window.speechSynthesis.cancel();}catch(_){}
  function step(){ if(my!==tts.token)return; if(i>=q.length){stop();return;} var u=new SpeechSynthesisUtterance(q[i++]); u.lang=(voice&&voice.lang)||"zh-TW"; if(voice)u.voice=voice; u.rate=1.0; u.pitch=1.0; u.onend=function(){if(my===tts.token)step();}; u.onerror=function(){if(my===tts.token)step();}; try{window.speechSynthesis.speak(u);}catch(_){stop();} }
  step(); }
function runYun(text,id){ var my=++tts.token; tts.active=true; tts.curId=id; tts.mode="yun"; syncBtns();
  var q=chunks(text),i=0;
  function step(){ if(my!==tts.token)return; if(i>=q.length){stop();return;} var first=(i===0),piece=q[i++];
    fetchPiece(piece).then(function(url){ if(my!==tts.token)return; if(i<q.length)fetchPiece(q[i]).catch(function(){}); var a=getAudio(); a.onended=null;a.onerror=null; a.src=url; a.onended=function(){if(my===tts.token)step();}; a.onerror=function(){if(my===tts.token)step();}; var p=a.play(); if(p&&p.catch)p.catch(function(){ if(my===tts.token)step(); }); })
    .catch(function(){ if(my!==tts.token)return; if(first){ tts.active=false; if(window.toast){try{window.toast("雲哲暫時連不上，改用裝置內建聲音");}catch(_){}} runNative(text,id); } else { step(); } }); }
  step(); }
tts.toggle=function(text,id){ if(tts.active&&tts.curId===id){ stop(); return; } stop(); unlock(); runYun(text,id); };
tts.stop=stop; tts.sync=syncBtns;
})();
</script>
